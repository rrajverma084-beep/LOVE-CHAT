</head>

<body>

<div class="header">🍭 LADUU PIYUU CHAT 💖</div>

<div class="chatbox" id="chatbox"></div>

<div id="emojiPicker">
<span onclick="addEmoji('😀')">😀</span>
<span onclick="addEmoji('😂')">😂</span>
<span onclick="addEmoji('😍')">😍</span>
<span onclick="addEmoji('😎')">😎</span>
<span onclick="addEmoji('❤️')">❤️</span>
<span onclick="addEmoji('👍')">👍</span>
</div>

<div class="inputArea">
<button onclick="toggleEmoji()">😊</button>
<input id="message" placeholder="Type message">
<input type="file" id="fileInput" accept="image/*,video/*">
<button onclick="sendMessage()">Send</button>
</div>

<div class="callArea">

<p>Your Call ID:</p>
<div id="myId">Connecting...</div>

<input id="callId" placeholder="Enter partner ID">

<br><br>

<button onclick="audioCall()">📞 Audio Call</button>
<button onclick="videoCall()">🎥 Video Call</button>

<div>
<video id="localVideo" autoplay muted></video>
<video id="remoteVideo" autoplay></video>
</div>

</div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

<script>

const firebaseConfig={
apiKey:"AIzaSyAKuUFmJshnvjHZ-bAhHN_bdlvwKkbyDbo",
authDomain:"love--chat-872da.firebaseapp.com",
databaseURL:"https://love--chat-872da-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"love--chat-872da"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let userId=localStorage.getItem("chatUserId");

if(!userId){
userId="user_"+Math.random().toString(36).substr(2,9);
localStorage.setItem("chatUserId",userId);
}

/* EMOJI */

function toggleEmoji(){
let box=document.getElementById("emojiPicker");
box.style.display=box.style.display==="none"?"block":"none";
}

function addEmoji(e){
document.getElementById("message").value+=e;
}

/* SEND MESSAGE */

function sendMessage(){

let msg=document.getElementById("message").value.trim();

if(msg==="")return;

db.ref("chat").push({
text:msg,
sender:userId,
time:new Date().toLocaleTimeString()
});

document.getElementById("message").value="";

}

/* FILE SEND */

document.getElementById("fileInput").addEventListener("change",function(){

let file=this.files[0];
if(!file)return;

let reader=new FileReader();

reader.onload=function(){

db.ref("chat").push({
file:reader.result,
type:file.type,
sender:userId,
time:new Date().toLocaleTimeString()
});

};

reader.readAsDataURL(file);

});

/* SHOW MESSAGE */

const chatbox=document.getElementById("chatbox");

db.ref("chat").on("child_added",function(snapshot){

let data=snapshot.val();

let div=document.createElement("div");

div.className=(data.sender===userId)?"message myMessage":"message otherMessage";

let content="";

if(data.text) content=data.text;

if(data.file){

if(data.type.startsWith("image")){
content="<img src='"+data.file+"'>";
}

if(data.type.startsWith("video")){
content="<video src='"+data.file+"' controls></video>";
}

}

let del="";

if(data.sender===userId){
del="<button class='deleteBtn' onclick='deleteMsg(\""+snapshot.key+"\")'>🗑</button>";
}

div.innerHTML=
del+
content+
"<span class='time'>"+data.time+"</span>"+
"<div><span onclick='react(\"❤️\")'>❤️</span></div>";

chatbox.appendChild(div);

chatbox.scrollTop=chatbox.scrollHeight;

});

/* DELETE */

function deleteMsg(id){
db.ref("chat/"+id).remove();
location.reload();
}

/* HEART */

function react(e){

if(e==="❤️"){

let heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"%";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),3000);

}

}

/* CALL SYSTEM */

let localStream;

const peer=new Peer();

peer.on("open",id=>{
document.getElementById("myId").innerText=id;
});

/* AUDIO CALL */

function audioCall(){

let id=document.getElementById("callId").value;

navigator.mediaDevices.getUserMedia({
audio:true,
video:false
}).then(stream=>{

localStream=stream;

const call=peer.call(id,stream);

call.on("stream",remote=>{
document.getElementById("remoteVideo").srcObject=remote;
});

});

}

/* VIDEO CALL */

function videoCall(){

let id=document.getElementById("callId").value;

navigator.mediaDevices.getUserMedia({
video:true,
audio:true
}).then(stream=>{

localStream=stream;

document.getElementById("localVideo").srcObject=stream;

const call=peer.call(id,stream);

call.on("stream",remote=>{
document.getElementById("remoteVideo").srcObject=remote;
});

});

}

/* RECEIVE CALL */

peer.on("call",call=>{

navigator.mediaDevices.getUserMedia({
video:true,
audio:true
}).then(stream=>{

localStream=stream;

document.getElementById("localVideo").srcObject=stream;

call.answer(stream);

call.on("stream",remote=>{
document.getElementById("remoteVideo").srcObject=remote;
});

});

});

</script>

</body>
</html>
