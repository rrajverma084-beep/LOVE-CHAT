<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍭 LADUU PIYUU CHAT 💖 </title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}

body{
  display:none;
  font-family:Arial, sans-serif;
  height:100vh;
  display:flex;
  flex-direction:column;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
}

.header{
  background:#1e293b;
  padding:12px;
  text-align:center;
  font-size:18px;
  position:sticky;
  top:0;
  z-index:100;
}

.status{
  text-align:center;
  font-size:12px;
  opacity:.7;
  margin:4px 0;
}

.chatbox{
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
  -webkit-overflow-scrolling:touch;
}

.message{
  padding:10px 14px;
  margin:5px;
  border-radius:16px;
  max-width:80%;
  word-wrap:break-word;
  font-size:15px;
}

.myMessage{background:#22c55e;margin-left:auto;}
.otherMessage{background:#334155;}

.time{
  font-size:10px;
  display:block;
  margin-top:3px;
  text-align:right;
  opacity:.6;
}

.inputArea{
  display:flex;
  padding:6px;
  gap:5px;
  align-items:center;
  background:#1e293b;
  position:sticky;
  bottom:0;
}

.inputArea input[type="text"]{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
  outline:none;
  font-size:14px;
}

#fileInput{
  width:80px;
  font-size:10px;
}

button{
  border:none;
  background:#22c55e;
  color:white;
  border-radius:50%;
  width:38px;
  height:38px;
  font-size:14px;
  display:flex;
  align-items:center;
  justify-content:center;
}

#emojiPicker{
  display:none;
  background:#1e293b;
  padding:10px;
  max-height:200px;
  overflow:auto;
}

#emojiPicker span{
  font-size:20px;
  margin:4px;
  cursor:pointer;
}

.callArea{
  background:#1e293b;
  padding:10px;
  text-align:center;
}

.callArea input{
  width:90%;
  padding:6px;
  margin-top:5px;
}

video{
  width:100%;
  max-width:300px;
  border-radius:10px;
  margin-top:5px;
}

img{
  max-width:100%;
  border-radius:10px;
}

/* 🔥 MOBILE RESPONSIVE */
@media (max-width:600px){
  .header{font-size:16px;padding:10px;}
  .message{font-size:14px;max-width:85%;}
  button{width:34px;height:34px;font-size:12px;}
  #fileInput{width:65px;font-size:9px;}
}
</style>

<script>
let pass = prompt("Enter Password");
if(pass === "2020"){
  document.addEventListener("DOMContentLoaded", ()=>{
    document.body.style.display="flex";
  });
}else{
  alert("Wrong Password");
  throw new Error("Wrong Password");
}
</script>

</head>
<body>

<div class="header">🍭 LADUU PIYUU CHAT 💖</div>
<div id="status" class="status">Online 🟢</div>
<div class="chatbox" id="chatbox"></div>
<div id="emojiPicker"></div>

<div class="inputArea">
<button onclick="toggleEmoji()">😊</button>
<input id="message" placeholder="Type message...">
<input type="file" id="fileInput" accept="image/*,video/*">
<button onclick="sendMessage()">➤</button>
</div>

<div class="callArea">
<p>Your Call ID:</p>
<div id="myId">...</div>
<input id="callId" placeholder="Enter partner ID">
<br><br>
<button onclick="audioCall()">📞</button>
<button onclick="videoCall()">🎥</button>
<button onclick="endCall()">❌</button>
<br>
<video id="localVideo" autoplay muted></video>
<video id="remoteVideo" autoplay></video>
</div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

<script>
// EMOJI
const emojis=["😀","😂","😍","😘","😎","😭","👍","🙏","🔥","❤️","💖","🥰"];
const picker=document.getElementById("emojiPicker");
emojis.forEach(e=>{
  let s=document.createElement("span");
  s.innerText=e;
  s.onclick=()=>message.value+=e;
  picker.appendChild(s);
});
function toggleEmoji(){
  picker.style.display=picker.style.display==='block'?'none':'block';
}

// FIREBASE
const firebaseConfig={
apiKey:"AIzaSyAKuUFmJshnvjHZ-bAhHN_bdlvwKkbyDbo",
authDomain:"love--chat-872da.firebaseapp.com",
databaseURL:"https://love--chat-872da-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"love--chat-872da"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let userId=localStorage.getItem("chatUserId");
if(!userId){
  userId="user_"+Math.random().toString(36).substr(2,9);
  localStorage.setItem("chatUserId",userId);
}

// SEND
function sendMessage(){
  let msg=message.value.trim();
  if(!msg) return;
  db.ref("chat").push({text:msg,sender:userId,time:Date.now()});
  message.value="";
}

// FILE
fileInput.onchange=function(){
  let file=this.files[0];
  let reader=new FileReader();
  reader.onload=()=>{
    db.ref("chat").push({file:reader.result,type:file.type,sender:userId,time:Date.now()});
  };
  reader.readAsDataURL(file);
};

// RECEIVE
db.ref("chat").on("child_added",snap=>{
  let d=snap.val();
  let div=document.createElement("div");
  div.className=d.sender===userId?"message myMessage":"message otherMessage";

  let content="";
  if(d.text) content=d.text;
  if(d.file){
    if(d.type.startsWith("image")) content="<img src='"+d.file+"'>";
    if(d.type.startsWith("video")) content="<video src='"+d.file+"' controls></video>";
  }

  let time=new Date(d.time).toLocaleTimeString();
  div.innerHTML=content+"<span class='time'>"+time+"</span>";

  chatbox.appendChild(div);
  chatbox.scrollTop=chatbox.scrollHeight;
});

// CALL
let peer=new Peer();
let currentCall=null;
peer.on("open",id=>myId.innerText=id);

function audioCall(){
  navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
    currentCall=peer.call(callId.value,stream);
    currentCall.on("stream",r=>remoteVideo.srcObject=r);
  });
}

function videoCall(){
  navigator.mediaDevices.getUserMedia({video:true,audio:true}).then(stream=>{
    localVideo.srcObject=stream;
    currentCall=peer.call(callId.value,stream);
    currentCall.on("stream",r=>remoteVideo.srcObject=r);
  });
}

peer.on("call",call=>{
  navigator.mediaDevices.getUserMedia({video:true,audio:true}).then(stream=>{
    localVideo.srcObject=stream;
    call.answer(stream);
    call.on("stream",r=>remoteVideo.srcObject=r);
    currentCall=call;
  });
});

function endCall(){
  if(currentCall) currentCall.close();
  remoteVideo.srcObject=null;
  localVideo.srcObject=null;
}
</script>

</body>
</html>
