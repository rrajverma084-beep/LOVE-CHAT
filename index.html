<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 PRO CHAT APP</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  display:flex;
  flex-direction:column;
  height:100vh;
  background:#0f172a;
  color:white;
}

.header{
  background:#1e293b;
  padding:12px;
  text-align:center;
  font-size:18px;
}

.chatbox{
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

.message{
  padding:10px 14px;
  margin:5px;
  border-radius:15px;
  max-width:75%;
}

.my{background:#22c55e; margin-left:auto;}
.other{background:#334155;}

.inputArea{
  display:flex;
  padding:8px;
  background:#1e293b;
}

input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
}

button{
  margin-left:5px;
  border:none;
  background:#22c55e;
  color:white;
  border-radius:50%;
  width:40px;
}

.status{
  font-size:12px;
  opacity:0.7;
}
</style>
</head>

<body>

<div class="header">🔥 PRO CHAT</div>
<div id="status" class="status">Connecting...</div>
<div class="chatbox" id="chatbox"></div>

<div class="inputArea">
<input id="msg" placeholder="Type message...">
<button onclick="send()">➤</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig={
apiKey:"AIzaSyAKuUFmJshnvjHZ-bAhHN_bdlvwKkbyDbo",
authDomain:"love--chat-872da.firebaseapp.com",
databaseURL:"https://love--chat-872da-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"love--chat-872da"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let userId=localStorage.getItem("userId");
if(!userId){
  userId="user_"+Math.random().toString(36).substr(2,9);
  localStorage.setItem("userId",userId);
}

// ONLINE STATUS
const statusRef=db.ref("status/"+userId);
statusRef.set("online");
statusRef.onDisconnect().set("offline");

document.getElementById("status").innerText="Online 🟢";

// SEND
function send(){
  let text=msg.value.trim();
  if(!text) return;

  db.ref("rooms/global").push({
    text,
    sender:userId,
    time:Date.now()
  });

  msg.value="";
}

// RECEIVE
db.ref("rooms/global").on("child_added",snap=>{
  let d=snap.val();

  let div=document.createElement("div");
  div.className="message "+(d.sender===userId?"my":"other");

  let time=new Date(d.time).toLocaleTimeString();

  div.innerHTML=d.text+"<br><small>"+time+"</small>";

  chatbox.appendChild(div);
  chatbox.scrollTop=chatbox.scrollHeight;
});

// TYPING INDICATOR
msg.oninput=()=>{
  db.ref("typing").set(userId);
};

db.ref("typing").on("value",snap=>{
  let val=snap.val();
  if(val && val!==userId){
    document.getElementById("status").innerText="Typing... ✍️";
  } else {
    document.getElementById("status").innerText="Online 🟢";
  }
});
</script>

</body>
</html>
