<html>
<head>

<style>

.callArea{

video{

}

@keyframes float{

<body>

<div class="header">❤️ Super Love Chat</div>

<div class="chatbox" id="chatbox"></div>

<div class="inputArea">
<input id="message" placeholder="Type message">
<button onclick="sendMessage()">Send</button>
</div>

<div class="callArea">

<p>Your Call ID:</p>
<div id="myId">Connecting...</div>

<input id="callId" placeholder="Enter partner ID">

<br><br>

<button onclick="startCamera()">Start Camera</button>
<button onclick="callUser()">📞 Call</button>

<div>
<video id="localVideo" autoplay muted></video>
<video id="remoteVideo" autoplay></video>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

<script>

const firebaseConfig={
apiKey:"AIzaSyAKuUFmJshnvjHZ-bAhHN_bdlvwKkbyDbo",
authDomain:"love--chat-872da.firebaseapp.com",
databaseURL:"https://love--chat-872da-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"love--chat-872da"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();

/* USER ID */

let userId=localStorage.getItem("chatUserId");

if(!userId){
userId="user_"+Math.random().toString(36).substr(2,9);
localStorage.setItem("chatUserId",userId);
}

/* SEND MESSAGE */

function sendMessage(){

let input=document.getElementById("message");
let msg=input.value.trim();

if(msg==="")return;

let time=new Date().toLocaleTimeString();

db.ref("chat").push({
text:msg,
time:time,
sender:userId
});

input.value="";
}

/* SHOW MESSAGE */

const chatbox=document.getElementById("chatbox");

db.ref("chat").on("child_added",function(snapshot){

let data=snapshot.val();

let div=document.createElement("div");

if(data.sender===userId){
div.className="message myMessage";
}else{
div.className="message otherMessage";
}

div.innerHTML=
data.text+
"<span class='time'>"+data.time+"</span>"+
"<div class='reactions'>"+
"<span onclick='react(\"❤️\")'>❤️</span>"+
"<span onclick='react(\"😂\")'>😂</span>"+
"<span onclick='react(\"👍\")'>👍</span>"+
"</div>";

chatbox.appendChild(div);

chatbox.scrollTop=chatbox.scrollHeight;

});

/* REACTION */

function react(emoji){

if(emoji==="❤️"){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"%";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),3000);

}

}

/* VIDEO CALL */

let localStream;

const peer=new Peer();

peer.on("open",function(id){
document.getElementById("myId").innerText=id;
});

async function startCamera(){

localStream=await navigator.mediaDevices.getUserMedia({
video:true,
audio:true
});

document.getElementById("localVideo").srcObject=localStream;

}

function callUser(){

let id=document.getElementById("callId").value;

const call=peer.call(id,localStream);

call.on("stream",function(remoteStream){

document.getElementById("remoteVideo").srcObject=remoteStream;

});

}

peer.on("call",function(call){

call.answer(localStream);

call.on("stream",function(remoteStream){

document.getElementById("remoteVideo").srcObject=remoteStream;

});

});

</script>

</body>
</html>
