<!DOCTYPE html>
<html>
<head>
<title>Private Chat</title>

<style>
body{
font-family: Arial;
background:#e5ddd5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
width:350px;
background:white;
border-radius:10px;
box-shadow:0 0 10px gray;
overflow:hidden;
}

.header{
background:#075E54;
color:white;
padding:10px;
text-align:center;
font-size:18px;
}

.chatbox{
height:320px;
padding:10px;
overflow-y:auto;
background:#efeae2;
display:flex;
flex-direction:column;
}

.message{
background:#dcf8c6;
padding:8px;
margin:5px;
border-radius:6px;
width:fit-content;
max-width:75%;
}

.time{
font-size:10px;
color:gray;
margin-top:3px;
