<!DOCTYPE html>
<html>
<head>
<title>Private Chat</title>

<style>
body{
font-family: Arial;
background:#e5ddd5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
width:350px;
background:white;
border-radius:10px;
box-shadow:0 0 10px gray;
overflow:hidden;
}

.header{
background:#075E54;
color:white;
padding:10px;
text-align:center;
font-size:18px;
}

.chatbox{
height:300px;
padding:10px;
overflow-y:auto;
background:#efeae2;
display:flex;
flex-direction:column;
}

.message{
background:#dcf8c6;
padding:8px;
margin:5px;
border-radius:5px;
width:fit-content;
}

.inputArea{
display:flex;
border-top:1px solid #ccc;
}

.inputArea input{
flex:1;
padding:10px;
border:none;
outline:none;
}

.inputArea button{
background:#25D366;
border:none;
padding:10px;
color:white;
cursor:pointer;
}

.login{
text-align:center;
padding:20px;
}
</style>

</head>

<body>

<div class="container">

<div class="header">Private Chat</div>

<div class="login" id="login">
<input type="password" id="password" placeholder="Enter Password">
<button onclick="login()">Enter</button>
</div>

<div id="chat" style="display:none;">

<div class="chatbox" id="chatbox"></div>

<div class="inputArea">
<input type="text" id="message" placeholder="Type message">
<button onclick="sendMessage()">Send</button>
</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import { getDatabase, ref, push, onChildAdded } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";


const firebaseConfig = {

apiKey: "AIzaSyAKuUFmJshnvjHZ-bAhHN_bdlvwKkbyDbo",

authDomain: "love--chat-872da.firebaseapp.com",

databaseURL: "https://love--chat-872da-default-rtdb.firebaseio.com",

projectId: "love--chat-872da",

storageBucket: "love--chat-872da.appspot.com",

messagingSenderId: "669278823844",

appId: "1:669278823844:web:b165f5000a3e82164c0d31"

};


const app = initializeApp(firebaseConfig);

const db = getDatabase(app);


window.login = function(){

var pass = document.getElementById("password").value;

if(pass == "1234"){

document.getElementById("login").style.display="none";

document.getElementById("chat").style.display="block";

}else{

alert("Wrong Password");

}

}


window.sendMessage = function(){

var msg = document.getElementById("message").value;

if(msg != ""){

push(ref(db,"chat"),{

text: msg,

time: Date.now()

});

document.getElementById("message").value="";

}

}


const chatbox = document.getElementById("chatbox");

onChildAdded(ref(db,"chat"), function(snapshot){

const data = snapshot.val();

const msg = document.createElement("div");

msg.className = "message";

msg.innerText = data.text;

chatbox.appendChild(msg);

chatbox.scrollTop = chatbox.scrollHeight;

});

</script>

</body>
</html>
