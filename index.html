<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍭 LADUU PIYUU CHAT 💖</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:sans-serif;
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:auto;
  background:linear-gradient(135deg,#ff9a9e,#ff4d6d,#ff758c);
}

#loginBox{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:linear-gradient(135deg,#ff4d6d,#ff9a9e);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:99999;
}

.header,.chatbox,.inputArea,.callArea{position:relative;z-index:1;}

.chatbox{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;}

.message{max-width:75%;padding:8px 12px;margin:4px 0;border-radius:8px;word-wrap:break-word;position:relative;}
.myMessage{background:#005c4b;color:white;margin-left:auto;}
.otherMessage{background:#202c33;color:white;}

.time{font-size:10px;opacity:.6;display:block;text-align:right;}

.inputArea{display:flex;gap:5px;padding:6px;background:#202c33;}
input{flex:1;padding:10px;border-radius:20px;border:none;background:#2a3942;color:white;}

button{border:none;background:#00a884;color:white;border-radius:50%;width:38px;height:38px;cursor:pointer;}

#emojiTabs{
  display:flex;
  gap:5px;
  overflow-x:auto;
  background:#111b21;
  padding:5px;
}

#emojiTabs button{
  background:#202c33;
  color:white;
  border:none;
  font-size:12px;
  padding:5px 10px;
  border-radius:10px;
  width:auto;
  height:auto;
}

#emojiPicker{
  display:none;
  background:#202c33;
  padding:10px;
  max-height:150px;
  overflow:auto;
}

#emojiPicker span{
  font-size:20px;
  margin:5px;
  cursor:pointer;
}

.callArea{display:none;background:#202c33;padding:10px;text-align:center;margin-top:25px;}

video{width:48%;border-radius:8px;margin-top:5px;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
<h2 style="color:white;">🔐 ENTER PASSWORD</h2>
<input id="passInput" type="password" placeholder="Password">
<button onclick="checkPassword()">GO</button>
<p id="error" style="color:white;margin-top:10px;"></p>
</div>

<div id="app">

<div class="header">💬 LADUU PIYUU CHAT</div>
<div id="chatbox" class="chatbox"></div>

<!-- EMOJI -->
<div id="emojiTabs"></div>
<div id="emojiPicker"></div>

<div class="inputArea">
<button onclick="toggleEmoji()">😊</button>
<input id="message" placeholder="Message">
<label style="color:white;">📎<input type="file" id="fileInput" hidden></label>
<button onclick="sendMessage()">➤</button>
</div>

<button onclick="toggleCall()">📞 Call</button>

<div id="callArea" class="callArea">
<div id="myId" style="color:white"></div>
<input id="callId" placeholder="Enter ID">
<br><br>
<button onclick="audioCall()">📞</button>
<button onclick="videoCall()">🎥</button>
<button onclick="endCall()">❌</button>

<video id="localVideo" autoplay muted></video>
<video id="remoteVideo" autoplay></video>
</div>

</div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

<script>

/* PASSWORD */
function checkPassword(){
let pass=document.getElementById("passInput").value;
if(pass==="2020"){
document.getElementById("loginBox").style.display="none";
}else{
document.getElementById("error").innerText="❌ Wrong Password!";
}
}

const message=document.getElementById("message");
const chatbox=document.getElementById("chatbox");
const emojiPicker=document.getElementById("emojiPicker");
const emojiTabs=document.getElementById("emojiTabs");

/* 🔥 WHATSAPP STYLE EMOJI SYSTEM */
const emojiGroups = {
"😀": [
"😀","😁","😂","🤣","😃","😄","😅","😆","😊","😇","🙂","🙃","😉","😌","😍","🥰","😘","😗","😙","😚",
"😋","😛","😝","😜","🤪","🤨","🧐","🤓","😎","🥳","😏","😒","😞","😔","😟","😕","🙁","☹️",
"😣","😖","😫","😩","🥺","😭","😢","😤","😠","😡","🤬","🤯","😳","🥵","🥶","😱","😨","😰","😥","😓",
"🤗","🤭","🫣","🤫","🤥","😶","😐","😑","😬","🙄","😯","😦","😧","😮","😲","🥱","😴","💤","😪",
"😵","🤤","😷","🤒","🤕","🤢","🤮","🤧"
],

"❤️": [
"❤️","🧡","💛","💚","💙","💜","🖤","🤍","🤎","💔","💕","💞","💓","💗","💖","💘","💝","💟"
],

"👋": [
"👋","🤚","✋","🖐","👌","🤌","🤏","✌️","🤞","🤟","🤘","🤙","👈","👉","👆","👇","☝️",
"👍","👎","✊","👊","🤛","🤜","👏","🙌","👐","🤲","🙏","💪","🤝"
],

"🤗": [
"🤗","🫂","💏","💑","👨‍❤️‍👨","👩‍❤️‍👩","👨‍❤️‍💋‍👨","👩‍❤️‍💋‍👩","💋","👀","👂","👃","👄","👅"
],

"🔥": [
"🔥","💯","⭐","🌟","✨","⚡","☀️","🌤️","⛅","🌈","☁️","🌙","🌚","🌝","🌸","🌹","🌺","🌻","🌼","🍀"
],

"😎": [
"🤓","🧐","😏","😒","😔","😞","😩","😫","😤","😡","🤯","🥶","🥵","😵","😴","💀","☠️","👻","👽","🤖"
],

"🎉": [
"🎉","🎊","🎈","🎁","🎀","🏆","🥇","🥈","🥉","🏅","🎖️","⚽","🏀","🏐","🎮","🎯","🎲","🎸","🎧"
],

"🐻": [
"🐶","🐱","🐭","🐹","🐰","🦊","🐻","🐼","🐨","🐯","🦁","🐮","🐷","🐸","🐵","🐔","🐧","🐦","🐤","🦄"
]
};

function loadEmojis(cat){
emojiPicker.innerHTML="";
emojiGroups[cat].forEach(e=>{
let s=document.createElement("span");
s.innerText=e;
s.onclick=()=>message.value+=e;
emojiPicker.appendChild(s);
});
}

Object.keys(emojiGroups).forEach((cat,i)=>{
let btn=document.createElement("button");
btn.innerText=cat;
btn.onclick=()=>loadEmojis(cat);
emojiTabs.appendChild(btn);
});

loadEmojis("😀");

function toggleEmoji(){
emojiPicker.style.display=emojiPicker.style.display==="block"?"none":"block";
}

message.addEventListener("keypress",e=>{
if(e.key==="Enter") sendMessage();
});

/* FIREBASE */
firebase.initializeApp({
apiKey:"AIzaSyAKuUFmJshnvjHZ-bAhHN_bdlvwKkbyDbo",
authDomain:"love--chat-872da.firebaseapp.com",
databaseURL:"https://love--chat-872da-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"love--chat-872da"
});

const db=firebase.database();

let userId=localStorage.getItem("chatUserId");
if(!userId){
userId="user_"+Math.random().toString(36).substr(2,9);
localStorage.setItem("chatUserId",userId);
}

function sendMessage(){
let msg=message.value.trim();
if(!msg)return;
db.ref("chat").push({text:msg,sender:userId,time:Date.now()});
message.value="";
}

fileInput.onchange=function(){
let file=this.files[0];
let reader=new FileReader();
reader.onload=()=>{
db.ref("chat").push({file:reader.result,type:file.type,sender:userId,time:Date.now()});
};
reader.readAsDataURL(file);
};

db.ref("chat").on("child_added",snap=>{
let d=snap.val();
let div=document.createElement("div");
div.className=d.sender===userId?"message myMessage":"message otherMessage";

let content="";
if(d.text) content=d.text;
if(d.file){
if(d.type.startsWith("image")) content=`<img src="${d.file}" style="max-width:200px;">`;
if(d.type.startsWith("video")) content=`<video src="${d.file}" controls></video>`;
}

div.innerHTML=content;
chatbox.appendChild(div);
chatbox.scrollTop=chatbox.scrollHeight;
});

/* CALL SYSTEM */
let peer=new Peer();
let currentCall=null;

peer.on("open",id=>document.getElementById("myId").innerText=id);

function audioCall(){
navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
currentCall=peer.call(document.getElementById("callId").value,stream);
currentCall.on("stream",r=>remoteVideo.srcObject=r);
});
}

function videoCall(){
navigator.mediaDevices.getUserMedia({video:true,audio:true}).then(stream=>{
localVideo.srcObject=stream;
currentCall=peer.call(document.getElementById("callId").value,stream);
currentCall.on("stream",r=>remoteVideo.srcObject=r);
});
}

peer.on("call",call=>{
if(!confirm("Incoming Call?")) return call.close();
navigator.mediaDevices.getUserMedia({video:true,audio:true}).then(stream=>{
localVideo.srcObject=stream;
call.answer(stream);
call.on("stream",r=>remoteVideo.srcObject=r);
currentCall=call;
});
});

function endCall(){
if(currentCall) currentCall.close();
localVideo.srcObject=null;
remoteVideo.srcObject=null;
}

function toggleCall(){
document.getElementById("callArea").style.display=
document.getElementById("callArea").style.display==="block"?"none":"block";
}

</script>
</body>
</html>
