<!DOCTYPE html>
<html>
<head>
<title>Private Chat</title>

<style>
body{

</head>

<body>

<div class="container">

<div class="header">Private Chat</div>

<div class="login" id="login">
<input type="password" id="password" placeholder="Enter Password">
<button onclick="login()">Enter</button>
</div>

<div id="chat" style="display:none;">

<div class="chatbox" id="chatbox"></div>

<div class="inputArea">
<input type="text" id="message" placeholder="Type message">
<button onclick="sendMessage()">Send</button>
</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";


const firebaseConfig = {

apiKey: "AIzaSyAKuUFmJshnvjHZ-bAhHN_bdlvwKkbyDbo",

authDomain: "love--chat-872da.firebaseapp.com",

databaseURL: "https://love--chat-872da-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId: "love--chat-872da",

storageBucket: "love--chat-872da.appspot.com",

messagingSenderId: "669278823844",

appId: "1:669278823844:web:b165f5000a3e82164c0d31"

};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);


window.login = function(){

let pass = document.getElementById("password").value;

if(pass === "1234"){

document.getElementById("login").style.display="none";
document.getElementById("chat").style.display="block";

}else{

alert("Wrong Password");

}

}


window.sendMessage = function(){

let input = document.getElementById("message");
let msg = input.value.trim();

if(msg === "") return;

push(ref(db,"chat"),{

text: msg,
time: new Date().toLocaleTimeString()

}).then(()=>{
console.log("Message saved");
}).catch((error)=>{
console.error("Error:", error);
});

input.value="";

}


document.getElementById("message").addEventListener("keypress",function(e){

if(e.key === "Enter"){

sendMessage();

}

});


const chatbox = document.getElementById("chatbox");

onChildAdded(ref(db,"chat"), function(snapshot){

const data = snapshot.val();

let msgDiv = document.createElement("div");
msgDiv.className="message";

msgDiv.innerHTML = `
<div>${data.text}</div>
<div class="time">${data.time}</div>
`;

chatbox.appendChild(msgDiv);

chatbox.scrollTop = chatbox.scrollHeight;

});

</script>

</body>
</html>
