
<!DOCTYPE html>
<html>
<head>
<title>🍭 LADUU PIYUU CHAT 💖</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
margin:0;

display:flex;
flex-direction:column;
}

.header{
background:#ff4d6d;
color:white;
padding:12px;
font-size:18px;
text-align:center;
}

.chatbox{
flex:1;

.message{

.myMessage{
background:#ffccd5;

}

.otherMessage{
background:white;
}

.time{
font-size:10px;
display:block;
margin-top:4px;
text-align:right;
opacity:.7;
}

.deleteBtn{
background:none;
border:none;
cursor:pointer;
font-size:14px;
float:right;
}

.reactions span{
cursor:pointer;
margin-right:6px;
}

.inputArea{
display:flex;
padding:8px;
background:white;
align-items:center;

.inputArea input[type="text"]{

padding:10px;
border-radius:20px;
border:1px solid #ccc;
}

.inputArea button{
padding:10px;
border:none;
background:#ff4d6d;
color:white;
border-radius:20px;
cursor:pointer;
}

#emojiPicker{
display:none;
padding:5px;
background:white;
}

#emojiPicker span{
font-size:22px;
cursor:pointer;
margin:4px;
}

.callArea{
background:#fff;
padding:10px;
text-align:center;
}

video{
width:45%;
margin:5px;
border-radius:10px;
}

@keyframes pop{
from{transform:scale(.7);opacity:0;}
to{transform:scale(1);opacity:1;}
}

.heart{
position:fixed;
bottom:0;
font-size:25px;
animation:float 3s linear;
}

@keyframes float{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-500px);opacity:0;}
}

img,video{
max-width:150px;
border-radius:10px;
}

</style>
</head>

<body>

<div class="header">🍭 LADUU PIYUU CHAT 💖</div>

<div class="chatbox" id="chatbox"></div>

<div id="emojiPicker">
<span onclick="addEmoji('😀')">😀</span>
<span onclick="addEmoji('😂')">😂</span>
<span onclick="addEmoji('😍')">😍</span>
<span onclick="addEmoji('😎')">😎</span>
<span onclick="addEmoji('❤️')">❤️</span>
<span onclick="addEmoji('👍')">👍</span>
</div>

<div class="inputArea">
<button onclick="toggleEmoji()">😊</button>
<input id="message" type="text" placeholder="Type message">
<input type="file" id="fileInput" accept="image/*,video/*">
<button onclick="sendMessage()">Send</button>
</div>

<div class="callArea">

<p>Your Call ID:</p>
<div id="myId">Connecting...</div>

<input id="callId" placeholder="Enter partner ID">

<br><br>

<button onclick="startCamera()">Start Camera</button>
<button onclick="audioCall()">📞 Audio Call</button>
<button onclick="callUser()">🎥 Video Call</button>

<div>
<video id="localVideo" autoplay muted></video>
<video id="remoteVideo" autoplay></video>
</div>

</div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

<script>

const firebaseConfig={
apiKey:"AIzaSyAKuUFmJshnvjHZ-bAhHN_bdlvwKkbyDbo",
authDomain:"love--chat-872da.firebaseapp.com",
databaseURL:"https://love--chat-872da-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"love--chat-872da"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let userId=localStorage.getItem("chatUserId");

if(!userId){
userId="user_"+Math.random().toString(36).substr(2,9);
localStorage.setItem("chatUserId",userId);
}

/* EMOJI */

function toggleEmoji(){
let box=document.getElementById("emojiPicker");
box.style.display=box.style.display==="none"?"block":"none";
}

function addEmoji(e){
document.getElementById("message").value+=e;
}

/* SEND MESSAGE */

function sendMessage(){

let input=document.getElementById("message");
let msg=input.value.trim();

if(msg==="")return;

db.ref("chat").push({
text:msg,
time:new Date().toLocaleTimeString(),
sender:userId
});

input.value="";
}

/* FILE SEND */

const fileInput=document.getElementById("fileInput");

fileInput.addEventListener("change",function(){

let file=this.files[0];
if(!file)return;

let reader=new FileReader();

reader.onload=function(){

db.ref("chat").push({
file:reader.result,
type:file.type,
sender:userId,
time:new Date().toLocaleTimeString()
});

};

reader.readAsDataURL(file);

});

/* SHOW MESSAGE */

const chatbox=document.getElementById("chatbox");

db.ref("chat").on("child_added",function(snapshot){

let data=snapshot.val();

let div=document.createElement("div");

div.className=(data.sender===userId)?"message myMessage":"message otherMessage";

let content="";

if(data.text) content=data.text;

if(data.file){

if(data.type.startsWith("image")){
content="<img src='"+data.file+"'>";
}

if(data.type.startsWith("video")){
content="<video src='"+data.file+"' controls></video>";
}

}

let deleteBtn="";

if(data.sender===userId){
deleteBtn="<button class='deleteBtn' onclick='deleteMsg(\""+snapshot.key+"\")'>🗑</button>";
}

div.innerHTML=
deleteBtn+
content+
"<span class='time'>"+data.time+"</span>"+
"<div class='reactions'>"+
"<span onclick='react(\"❤️\")'>❤️</span>"+
"<span onclick='react(\"😂\")'>😂</span>"+
"<span onclick='react(\"👍\")'>👍</span>"+
"</div>";

chatbox.appendChild(div);
chatbox.scrollTop=chatbox.scrollHeight;

});

/* DELETE MESSAGE */

function deleteMsg(id){
db.ref("chat/"+id).remove();
location.reload();
}

/* REACTION */

function react(emoji){

if(emoji==="❤️"){

let heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"%";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),3000);

}

}

/* CALL SYSTEM */

let localStream;
const peer=new Peer();

peer.on("open",function(id){
document.getElementById("myId").innerText=id;
});

async function startCamera(){

localStream=await navigator.mediaDevices.getUserMedia({
video:true,
audio:true
});

document.getElementById("localVideo").srcObject=localStream;

}

function audioCall(){

let id=document.getElementById("callId").value;

navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{

localStream=stream;

const call=peer.call(id,stream);

call.on("stream",function(remoteStream){

document.getElementById("remoteVideo").srcObject=remoteStream;

});

});

}

function callUser(){

let id=document.getElementById("callId").value;

const call=peer.call(id,localStream);

call.on("stream",function(remoteStream){

document.getElementById("remoteVideo").srcObject=remoteStream;

});

}

peer.on("call",function(call){

call.answer(localStream);

call.on("stream",function(remoteStream){

document.getElementById("remoteVideo").srcObject=remoteStream;

});

});

</script>

</body>
</html>
