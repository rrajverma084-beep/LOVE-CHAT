<!DOCTYPE html>
<html>
<head>
<title>🍭 LADUU PIYUU CHAT 💖</title>

<script>
let pass = prompt("Enter Password");
if(pass !== "2020"){
document.write("<h1 style='text-align:center;margin-top:100px;'>❌ Wrong Password</h1>");
throw new Error("Wrong Password");
}
</script>

<style>

body{
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
margin:0;
height:100vh;
display:flex;
flex-direction:column;
}

.header{
background:#ff4d6d;
color:white;
padding:12px;
font-size:18px;
text-align:center;
flex-shrink:0;
}

.chatbox{
flex:1;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
}

.message{
padding:10px 14px;
margin:8px;
border-radius:20px;
max-width:70%;
animation:pop .25s ease;
position:relative;
word-wrap:break-word;
}

.myMessage{
background:#ffccd5;
margin-left:auto;
}

.otherMessage{
background:white;
}

.time{
font-size:10px;
display:block;
margin-top:4px;
text-align:right;
opacity:.7;
}

.deleteBtn{
background:none;
border:none;
cursor:pointer;
font-size:14px;
float:right;
}

.inputArea{
display:flex;
padding:8px;
background:white;
gap:5px;
flex-wrap:wrap;
}

.inputArea input[type="text"]{
flex:1 1 auto;
padding:10px;
border-radius:20px;
border:1px solid #ccc;
min-width:100px;
}

.inputArea button{
padding:10px 16px;
border:none;
background:#ff4d6d;
color:white;
border-radius:20px;
cursor:pointer;
flex-shrink:0;
}

#emojiPicker{
display:none;
background:white;
padding:5px;
flex-wrap:wrap;
}

#emojiPicker span{
font-size:22px;
cursor:pointer;
margin:4px;
}

.callArea{
background:#fff;
padding:10px;
text-align:center;
flex-shrink:0;
}

video{
width:48%;
max-width:300px;
border-radius:10px;
margin:5px 1%;
}

img{
max-width:100%;
border-radius:10px;
height:auto;
}

@keyframes pop{
from{transform:scale(.7);opacity:0;}
to{transform:scale(1);opacity:1;}
}

.heart{
position:fixed;
bottom:0;
font-size:25px;
animation:float 3s linear;
}

@keyframes float{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-500px);opacity:0;}
}

/* Responsive Styles */
@media (max-width:768px){
.header{
font-size:16px;
padding:10px;
}

.message{
max-width:85%;
padding:8px 12px;
}

.inputArea input[type="text"]{
min-width:70px;
}

video{
width:95%;
margin:5px 0;
}

.callArea{
padding:8px;
}

.inputArea button{
padding:8px 12px;
}
}

@media (max-width:480px){
.header{
font-size:14px;
padding:8px;
}

.inputArea{
gap:3px;
padding:5px;
}

.inputArea input[type="text"]{
flex:1 1 60%;
padding:6px 8px;
}

.inputArea button{
padding:6px 10px;
font-size:14px;
}

video{
width:100%;
margin:3px 0;
}

}

</style>
</head>

<body>

<div class="header">🍭 LADUU PIYUU CHAT 💖</div>

<div class="chatbox" id="chatbox"></div>

<div id="emojiPicker">
<span onclick="addEmoji('😀')">😀</span>
<span onclick="addEmoji('😂')">😂</span>
<span onclick="addEmoji('😍')">😍</span>
<span onclick="addEmoji('😎')">😎</span>
<span onclick="addEmoji('❤️')">❤️</span>
<span onclick="addEmoji('👍')">👍</span>
</div>

<div class="inputArea">
<button onclick="toggleEmoji()">😊</button>
<input id="message" type="text" placeholder="Type message">
<input type="file" id="fileInput" accept="image/*,video/*">
<button onclick="sendMessage()">Send</button>
</div>

<div class="callArea">

<p>Your Call ID:</p>
<div id="myId">Connecting...</div>

<input id="callId" placeholder="Enter partner ID">

<br><br>

<button onclick="audioCall()">📞 Audio Call</button>
<button onclick="videoCall()">🎥 Video Call</button>

<div>
<video id="localVideo" autoplay muted></video>
<video id="remoteVideo" autoplay></video>
</div>

</div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

<script>
// Your existing JS code remains the same
// (firebase, sending messages, file uploads, reactions, peer calls)
</script>

</body>
</html>
