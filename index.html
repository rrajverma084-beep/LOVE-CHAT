<!DOCTYPE html>
<html>
<head>
<title>Private Love Chat</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4,#ffdde1);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
width:360px;
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 0 10px gray;
}

.header{
background:#ff4d6d;
color:white;
padding:10px;
text-align:center;
}

.chatbox{
height:250px;
overflow:auto;
padding:10px;
background:#fff0f3;
}

.message{
background:#dcf8c6;
padding:8px;
margin:5px;
border-radius:6px;
width:fit-content;
}

.inputArea{
display:flex;
border-top:1px solid #ccc;
}

.inputArea input{
flex:1;
padding:10px;
border:none;
}

.inputArea button{
background:#ff4d6d;
border:none;
color:white;
padding:10px;
}

video{
width:48%;
margin:1%;
background:black;
border-radius:8px;
}

.callButtons{
text-align:center;
padding:5px;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
❤️ Private Love Chat
</div>

<div class="chatbox" id="chatbox"></div>

<div class="inputArea">
<input type="text" id="message" placeholder="Type message">
<button onclick="sendMessage()">Send</button>
</div>

<div class="callButtons">
<button onclick="startCamera()">Start Camera</button>
<button onclick="startCall()">📞 Call</button>
</div>

<div style="text-align:center">
<video id="localVideo" autoplay muted></video>
<video id="remoteVideo" autoplay></video>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

const firebaseConfig = {

apiKey: "AIzaSyAKuUFmJshnvjHZ-bAhHN_bdlvwKkbyDbo",
authDomain: "love--chat-872da.firebaseapp.com",
databaseURL: "https://love--chat-872da-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "love--chat-872da"

};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let localStream;
let pc;

window.startCamera = async function(){

localStream = await navigator.mediaDevices.getUserMedia({
video:true,
audio:true
});

document.getElementById("localVideo").srcObject = localStream;

}

window.startCall = async function(){

pc = new RTCPeerConnection({
iceServers:[
{urls:"stun:stun.l.google.com:19302"}
]
});

localStream.getTracks().forEach(track=>{
pc.addTrack(track,localStream);
});

pc.ontrack = function(event){
document.getElementById("remoteVideo").srcObject = event.streams[0];
}

const offer = await pc.createOffer();
await pc.setLocalDescription(offer);

push(ref(db,"calls"),{
offer: JSON.stringify(offer)
});

}

window.sendMessage = function(){

let input=document.getElementById("message");
let msg=input.value.trim();

if(msg==="") return;

push(ref(db,"chat"),{
text:msg,
time:new Date().toLocaleTimeString()
});

input.value="";

}

const chatbox=document.getElementById("chatbox");

onChildAdded(ref(db,"chat"),function(snapshot){

const data=snapshot.val();

let div=document.createElement("div");
div.className="message";

div.innerHTML=data.text;

chatbox.appendChild(div);

chatbox.scrollTop=chatbox.scrollHeight;

});

</script>

</body>
</html>
