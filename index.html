<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍭 LADUU PIYUU CHAT 💖</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:sans-serif;
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:auto;
  background:linear-gradient(135deg,#ff9a9e,#ff4d6d,#ff758c);
}

.heart,.cloud,.glitter,.bgText{
  pointer-events:none;
  z-index:0;
  position:absolute;
}

.heart{
  bottom:-50px;
  font-size:20px;
  animation:floatUp 8s linear infinite;
  opacity:0.7;
}

@keyframes floatUp{0%{transform:translateY(0);}100%{transform:translateY(-110vh);}}

.cloud{
  top:10%;
  font-size:30px;
  animation:moveCloud 25s linear infinite;
  opacity:0.6;
}

@keyframes moveCloud{0%{left:-100px;}100%{left:110%;}}

.glitter{
  width:5px;height:5px;background:white;border-radius:50%;
  animation:glow 3s infinite;
}

@keyframes glow{0%{opacity:.3;}50%{opacity:1;}100%{opacity:.3;}}

.bgText{
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:40px;
  color:white;
  opacity:0.15;
}

.header,.chatbox,.inputArea,.callArea{position:relative;z-index:1;}

.chatbox{
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

.message{
  max-width:75%;
  padding:8px 12px;
  margin:4px 0;
  border-radius:8px;
  word-wrap:break-word;
  position:relative;
}

.myMessage{background:#005c4b;color:white;margin-left:auto;}
.otherMessage{background:#202c33;color:white;}

.time{font-size:10px;opacity:.6;display:block;text-align:right;}

.deleteBtn{
  background:red;
  border:none;
  color:white;
  border-radius:50%;
  width:20px;
  height:20px;
  font-size:12px;
  margin-left:5px;
  cursor:pointer;
}

.inputArea{
  display:flex;
  gap:5px;
  padding:6px;
  background:#202c33;
}

input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
  background:#2a3942;
  color:white;
}

button{
  border:none;
  background:#00a884;
  color:white;
  border-radius:50%;
  width:38px;
  height:38px;
}

#emojiPicker{
  display:none;
  background:#202c33;
  padding:10px;
  max-height:120px;
  overflow:auto;
  position:relative;
  z-index:2;
}

#emojiPicker span{
  font-size:22px;
  margin:5px;
  cursor:pointer;
}

.callArea{
  display:none;
  background:#202c33;
  padding:10px;
  text-align:center;
}

video{
  width:48%;
  border-radius:8px;
  margin-top:5px;
}

.message img,.message video{
  max-width:200px;
  max-height:200px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="bgText">💖 LADUU PIYUU 💖</div>

<div class="heart" style="left:10%">❤️</div>
<div class="heart" style="left:30%">💖</div>
<div class="heart" style="left:50%">💕</div>
<div class="heart" style="left:70%">💗</div>
<div class="heart" style="left:90%">💓</div>

<div class="cloud" style="top:10%">☁️</div>
<div class="cloud" style="top:20%">☁️</div>
<div class="cloud" style="top:30%">☁️</div>

<div id="chatbox" class="chatbox"></div>

<div id="emojiPicker"></div>

<div class="inputArea">
<button id="emojiBtn">😊</button>
<input id="message" placeholder="Message">
<label style="color:white;font-size:18px;cursor:pointer;">
📎
<input type="file" id="fileInput" hidden>
</label>
<button id="sendBtn">➤</button>
</div>

<button id="callToggle">📞 Call</button>

<div id="callArea" class="callArea">
<p id="myId"></p>
<input id="callId" placeholder="Enter ID"><br><br>
<button id="audioBtn">📞</button>
<button id="videoBtn">🎥</button>
<button id="endBtn">❌</button><br>
<video id="localVideo" autoplay muted></video>
<video id="remoteVideo" autoplay></video>
</div>

<audio id="sendSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>
<audio id="ringtone" src="https://www.soundjay.com/phone/sounds/telephone-ring-01a.mp3" loop></audio>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

<script>

try{

const PASS="2020";
let p=prompt("Enter Password");
if(p!==PASS){
alert("Wrong Password");
throw new Error("stop");
}

for(let i=0;i<25;i++){
let g=document.createElement("div");
g.className="glitter";
g.style.left=Math.random()*100+"%";
g.style.top=Math.random()*100+"%";
document.body.appendChild(g);
}

firebase.initializeApp({
apiKey:"AIzaSyAKuUFmJshnvjHZ-bAhHN_bdlvwKkbyDbo",
authDomain:"love--chat-872da.firebaseapp.com",
databaseURL:"https://love--chat-872da-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"love--chat-872da"
});

const db=firebase.database();

let userId=localStorage.getItem("chatUserId")||("user_"+Math.random());
localStorage.setItem("chatUserId",userId);

/* EMOJI */
const emojis=["😀","😂","😍","😘","😎","😭","👍","🔥","❤️"];
emojis.forEach(e=>{
let s=document.createElement("span");
s.innerText=e;
s.onclick=()=>message.value+=e;
emojiPicker.appendChild(s);
});

emojiBtn.onclick=()=>emojiPicker.style.display=
emojiPicker.style.display==="block"?"none":"block";

/* SEND */
sendBtn.onclick=()=>{
if(!message.value.trim())return;

db.ref("chat").push({
text:message.value,
sender:userId,
time:Date.now()
});

message.value="";
sendSound.play().catch(()=>{});
};

/* FILE */
fileInput.onchange=function(){
let file=this.files[0];
let reader=new FileReader();

reader.onload=()=>{
db.ref("chat").push({
file:reader.result,
type:file.type,
sender:userId,
time:Date.now()
});
};
reader.readAsDataURL(file);
};

/* LOAD */
db.ref("chat").on("child_added",snap=>{
let d=snap.val();
let key=snap.key;

let div=document.createElement("div");
div.setAttribute("data-id",key);

div.className=d.sender===userId?"message myMessage":"message otherMessage";

let content=d.text||"";
if(d.file){
if(d.type.startsWith("image")) content=`<img src="${d.file}">`;
if(d.type.startsWith("video")) content=`<video src="${d.file}" controls></video>`;
}

let delBtn="";
if(d.sender===userId){
delBtn=`<button class="deleteBtn" onclick="deleteMsg('${key}')">❌</button>`;
}

div.innerHTML=content+delBtn+
`<span class="time">${new Date(d.time).toLocaleTimeString()}</span>`;

chatbox.appendChild(div);
chatbox.scrollTop=chatbox.scrollHeight;
});

/* REAL TIME DELETE */
db.ref("chat").on("child_removed",snap=>{
let key=snap.key;

document.querySelectorAll(".message").forEach(msg=>{
if(msg.getAttribute("data-id")===key){
msg.remove();
}
});
});

/* DELETE */
function deleteMsg(id){
if(confirm("Delete message?")){
db.ref("chat/"+id).remove();
}
}

/* CALL */
let peer=new Peer();
let currentCall=null;

peer.on("open",id=>myId.innerText=id);

callToggle.onclick=()=>{
callArea.style.display=callArea.style.display==="block"?"none":"block";
};

audioBtn.onclick=()=>{
navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
currentCall=peer.call(callId.value,stream);
currentCall.on("stream",r=>remoteVideo.srcObject=r);
});
};

videoBtn.onclick=()=>{
navigator.mediaDevices.getUserMedia({video:true,audio:true}).then(stream=>{
localVideo.srcObject=stream;
currentCall=peer.call(callId.value,stream);
currentCall.on("stream",r=>remoteVideo.srcObject=r);
});
};

peer.on("call",call=>{
ringtone.play();
if(!confirm("Accept Call?")){
call.close();
return;
}

navigator.mediaDevices.getUserMedia({video:true,audio:true}).then(stream=>{
localVideo.srcObject=stream;
call.answer(stream);
call.on("stream",r=>remoteVideo.srcObject=r);
currentCall=call;
ringtone.pause();
});
});

endBtn.onclick=()=>{
if(currentCall)currentCall.close();
localVideo.srcObject=null;
remoteVideo.srcObject=null;
};

}catch(e){
console.error(e);
alert("Error aaya hai console check karo");
}

</script>
</body>
</html>
