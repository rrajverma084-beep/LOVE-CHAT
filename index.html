<!DOCTYPE html>
<html>
<head>
<title>Private Love Chat</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#ff9a9e,#fad0c4,#ffdde1);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
width:360px;
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 0 10px gray;
}

.header{
background:#ff4d6d;
color:white;
padding:10px;
text-align:center;
}

.chatbox{
height:220px;
overflow:auto;
padding:10px;
background:#fff0f3;
}

.message{
background:#dcf8c6;
padding:8px;
margin:5px;
border-radius:6px;
width:fit-content;
}

.deleteBtn{
margin-left:8px;
cursor:pointer;
color:red;
font-size:12px;
}

.inputArea{
display:flex;
border-top:1px solid #ccc;
}

.inputArea input{
flex:1;
padding:10px;
border:none;
}

.inputArea button{
background:#ff4d6d;
border:none;
color:white;
padding:10px;
cursor:pointer;
}

.callArea{
text-align:center;
padding:10px;
}

video{
width:48%;
background:black;
border-radius:8px;
margin:2px;
}

/* Emoji Buttons Style */
.emojiArea span{
cursor:pointer;
font-size:22px;
margin:2px;
}

.emojiArea{
padding:5px;
text-align:left;
background:#fff0f3;
border-top:1px solid #ccc;
border-bottom:1px solid #ccc;
}

</style>
</head>

<body>

<div class="container">

<div class="header">❤️ Private Love Chat</div>

<div class="chatbox" id="chatbox"></div>

<!-- Emoji Buttons -->
<div class="emojiArea">
<span>😍</span>
<span>😂</span>
<span>😢</span>
<span>😎</span>
<span>❤️</span>
<span>👍</span>
<span>🤔</span>
<span>🥰</span>
<span>😜</span>
</div>

<div class="inputArea">
<input type="text" id="message" placeholder="Type message">
<button onclick="sendMessage()">Send</button>
</div>

<div class="callArea">

<p>Your Call ID:</p>
<div id="myId">Connecting...</div>

<input id="callId" placeholder="Enter partner ID">

<br><br>

<button onclick="startCamera()">Start Camera</button>
<button onclick="callUser()">📞 Call</button>

</div>

<div style="text-align:center">
<video id="localVideo" autoplay muted></video>
<video id="remoteVideo" autoplay></video>
</div>

</div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

<script>

const firebaseConfig = {

apiKey: "AIzaSyAKuUFmJshnvjHZ-bAhHN_bdlvwKkbyDbo",
authDomain: "love--chat-872da.firebaseapp.com",
databaseURL: "https://love--chat-872da-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "love--chat-872da"

};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let localStream;

/* MESSAGE SEND */

function sendMessage(){

let input=document.getElementById("message");
let msg=input.value.trim();

if(msg==="") return;

db.ref("chat").push({
text:msg
});

input.value="";

}

/* MESSAGE SHOW */

const chatbox=document.getElementById("chatbox");

db.ref("chat").on("child_added",function(snapshot){

let data=snapshot.val();
let key=snapshot.key;

let div=document.createElement("div");
div.className="message";
div.id="msg-"+key;

div.innerHTML = data.text + 
"<span class='deleteBtn' onclick=\"deleteMessage('" + key + "')\">❌</span>";

chatbox.appendChild(div);

chatbox.scrollTop=chatbox.scrollHeight;

});

/* DELETE MESSAGE */

function deleteMessage(id){

db.ref("chat/"+id).remove();

let msg=document.getElementById("msg-"+id);

if(msg){
msg.remove();
}

}

/* VIDEO CALL */

const peer = new Peer();

peer.on("open",function(id){
document.getElementById("myId").innerText=id;
});

async function startCamera(){

localStream = await navigator.mediaDevices.getUserMedia({
video:true,
audio:true
});

document.getElementById("localVideo").srcObject = localStream;

}

function callUser(){

let id=document.getElementById("callId").value;

const call = peer.call(id, localStream);

call.on("stream",function(remoteStream){
document.getElementById("remoteVideo").srcObject = remoteStream;
});

}

peer.on("call",function(call){

call.answer(localStream);

call.on("stream",function(remoteStream){
document.getElementById("remoteVideo").srcObject = remoteStream;
});

});

/* EMOJI CLICK TO INPUT */

document.querySelectorAll('.emojiArea span').forEach(function(emoji){
    emoji.addEventListener('click', function(e){
        let input = document.getElementById('message');
        input.value += e.target.innerText;
        input.focus();
    });
});

</script>

</body>
</html>
