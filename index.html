import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

const firebaseConfig = {

};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

let myName="User";

window.login=function(){

let pass=document.getElementById("password").value;

if(pass==="1234"){

myName=document.getElementById("name").value || "User";

document.getElementById("login").style.display="none";

}else{

alert("Wrong Password");

}

window.sendMessage=function(){

let input=document.getElementById("message");
let text=input.value.trim();

if(text==="") return;

push(ref(db,"chat"),{

name:myName,
text:text,
time:new Date().toLocaleTimeString()

});

input.value="";

}

document.getElementById("message").addEventListener("keypress",function(e){

if(e.key==="Enter") sendMessage();

});

const chatbox=document.getElementById("chatbox");

onChildAdded(ref(db,"chat"),(snapshot)=>{

let data=snapshot.val();
let key=snapshot.key;

let div=document.createElement("div");

let sender=data.name || "User";

div.className="msg "+(sender===myName?"me":"other");

div.innerHTML=`

<div class="name">${sender}</div>
<div>${data.text}</div>
<div class="time">${data.time}</div>
<div class="delete" onclick="deleteMsg('${key}')">delete</div>

`;

chatbox.appendChild(div);

chatbox.scrollTop=chatbox.scrollHeight;

});

window.deleteMsg=function(id){

remove(ref(db,"chat/"+id));

}

</script>
