<html>
<head>

<style>

body{

justify-content:center;

.header{
background:#ff4d6d;

}

.message{

}

.inputArea{

border-top:1px solid #ccc;
}

.inputArea input{

.inputArea button{

video{

</head>

<body>

<div class="container">

<div class="header">
❤️ Private Love Chat
</div>

<div class="chatbox" id="chatbox"></div>

<div class="inputArea">
<input type="text" id="message" placeholder="Type message">
<button onclick="sendMessage()">Send</button>
</div>

<div class="callArea">

<p>Your Call ID:</p>
<div id="myId">Connecting...</div>

<input id="callId" placeholder="Enter partner ID">

<br><br>

<button onclick="startCamera()">Start Camera</button>
<button onclick="callUser()">📞 Call</button>

</div>

<div style="text-align:center">
<video id="localVideo" autoplay muted></video>
<video id="remoteVideo" autoplay></video>
</div>

</div>

<!-- PeerJS -->
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

<script>

const firebaseConfig = {

apiKey: "AIzaSyAKuUFmJshnvjHZ-bAhHN_bdlvwKkbyDbo",
authDomain: "love--chat-872da.firebaseapp.com",
databaseURL: "https://love--chat-872da-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "love--chat-872da"

};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let localStream;

/* CHAT */

function sendMessage(){

let input=document.getElementById("message");
let msg=input.value.trim();

if(msg==="") return;

db.ref("chat").push({
text:msg,
time:new Date().toLocaleTimeString()
});

input.value="";

}

const chatbox=document.getElementById("chatbox");

db.ref("chat").on("child_added",function(snapshot){

let data=snapshot.val();

let div=document.createElement("div");
div.className="message";

div.innerHTML=data.text;

chatbox.appendChild(div);

chatbox.scrollTop=chatbox.scrollHeight;

});

/* VIDEO CALL */

const peer = new Peer();

peer.on("open",function(id){

document.getElementById("myId").innerText=id;

});

async function startCamera(){

localStream = await navigator.mediaDevices.getUserMedia({
video:true,
audio:true
});

document.getElementById("localVideo").srcObject = localStream;

}

function callUser(){

let id=document.getElementById("callId").value;

const call = peer.call(id, localStream);

call.on("stream",function(remoteStream){

document.getElementById("remoteVideo").srcObject = remoteStream;

});

}

peer.on("call",function(call){

call.answer(localStream);

call.on("stream",function(remoteStream){

document.getElementById("remoteVideo").srcObject = remoteStream;

});

});

</script>

</body>
</html>
