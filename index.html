```html
<!DOCTYPE html>
<html>
<head>
<title>Private Chat</title>

<style>

body{
font-family:Arial;
background:#ece5dd;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
width:380px;
height:520px;
background:white;
display:flex;
flex-direction:column;
border-radius:10px;
overflow:hidden;
}

.header{
background:#075E54;
color:white;
padding:12px;
text-align:center;
font-size:18px;
}

.chatbox{
flex:1;
overflow-y:auto;
padding:10px;
}

.message{
background:#dcf8c6;
padding:8px;
margin:6px 0;
border-radius:6px;
max-width:70%;
}

.inputArea{
display:flex;
border-top:1px solid #ccc;
}

.inputArea input{
flex:1;
padding:10px;
border:none;
outline:none;
}

.inputArea button{
background:#25D366;
border:none;
color:white;
padding:10px 15px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<div class="header">Private Chat</div>

<div id="chatbox" class="chatbox"></div>

<div class="inputArea">

<input id="message" placeholder="Type message">

<button onclick="sendMessage()">Send</button>

</div>

</div>

<script>

function sendMessage(){

let msg=document.getElementById("message").value;

if(msg==="") return;

let chatbox=document.getElementById("chatbox");

let div=document.createElement("div");

div.className="message";

div.innerText=msg;

chatbox.appendChild(div);

document.getElementById("message").value="";

chatbox.scrollTop=chatbox.scrollHeight;

}

</script>

</body>
</html
