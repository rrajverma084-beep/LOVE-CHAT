
<!DOCTYPE html>
<html>
<head>
<title>🍭 LADUU PIYUU CHAT 💖</title>

<style>

body{
font-family:Arial;
background:#e5ddd5;
margin:0;
height:100vh;
display:flex;
flex-direction:column;
}

/* HEADER */

.header{
background:#ff4d6d;
color:white;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:18px;
}

/* CHAT */

.chatbox{
flex:1;
overflow-y:auto;
padding:10px;
}

.message{
padding:8px 12px;
margin:6px;
border-radius:15px;
max-width:70%;
word-wrap:break-word;
}

.myMessage{
background:#ffd6e0;
margin-left:auto;
}

.otherMessage{
background:white;
}

.time{
font-size:10px;
display:block;
margin-top:3px;
text-align:right;
}

/* INPUT */

.inputArea{
display:flex;
padding:6px;
background:#f0f0f0;
}

.inputArea input{
flex:1;
padding:10px;
border:none;
border-radius:20px;
}

.inputArea button{
background:#ff4d6d;
border:none;
color:white;
padding:10px;
margin-left:5px;
border-radius:20px;
cursor:pointer;
}

/* CALL POPUP */

#incomingCall{
display:none;
position:fixed;
top:40%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
text-align:center;
z-index:1000;
}

/* VIDEO POPUP */

#videoPopup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:999;
}

#videoPopup video{
width:45%;
margin:10px;
border-radius:10px;
}

#closeCall{
background:red;
color:white;
padding:10px 20px;
border:none;
border-radius:8px;
}

</style>
</head>

<body>

<script>

let password="";
while(password!=="2020"){
password=prompt("Enter Password to Open LADUU PIYUU CHAT");

if(password===null){
document.body.innerHTML="<h2 style='text-align:center;margin-top:50px;'>Access Cancelled</h2>";
throw new Error("cancel");
}
}

</script>

<div class="header">
🍭 LADUU PIYUU CHAT 💖
<button onclick="startCall()">📞</button>
</div>

<div class="chatbox" id="chatbox"></div>

<div class="inputArea">
<input id="message" placeholder="Type message">
<button onclick="sendMessage()">Send</button>
</div>

<div id="incomingCall">
<h3>📞 Incoming Call</h3>
<button onclick="acceptCall()">Accept</button>
<button onclick="rejectCall()">Reject</button>
</div>

<div id="videoPopup">
<video id="localVideo" autoplay muted></video>
<video id="remoteVideo" autoplay></video>
<button id="closeCall" onclick="endCall()">🔴 End Call</button>
</div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

<script>

const firebaseConfig={
apiKey:"AIzaSyAKuUFmJshnvjHZ-bAhHN_bdlvwKkbyDbo",
authDomain:"love--chat-872da.firebaseapp.com",
databaseURL:"https://love--chat-872da-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"love--chat-872da"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();

let userId=localStorage.getItem("chatUserId");

if(!userId){
userId="user_"+Math.random().toString(36).substr(2,9);
localStorage.setItem("chatUserId",userId);
}

/* SEND MESSAGE */

function sendMessage(){

let input=document.getElementById("message");
let msg=input.value.trim();

if(msg==="")return;

let time=new Date().toLocaleTimeString();

db.ref("chat").push({
text:msg,
time:time,
sender:userId
});

input.value="";
}

/* SHOW MESSAGE */

const chatbox=document.getElementById("chatbox");

db.ref("chat").on("child_added",function(snapshot){

let data=snapshot.val();

let div=document.createElement("div");

if(data.sender===userId){
div.className="message myMessage";
}else{
div.className="message otherMessage";
}

div.innerHTML=data.text+"<span class='time'>"+data.time+"</span>";

chatbox.appendChild(div);

chatbox.scrollTop=chatbox.scrollHeight;

});

/* VIDEO CALL */

let localStream;

const peer=new Peer();

async function startCamera(){

localStream=await navigator.mediaDevices.getUserMedia({
video:true,
audio:true
});

document.getElementById("localVideo").srcObject=localStream;

document.getElementById("videoPopup").style.display="flex";

}

peer.on("call",function(call){

startCamera();

call.answer(localStream);

call.on("stream",function(remoteStream){

document.getElementById("remoteVideo").srcObject=remoteStream;

});

});

/* CALL BUTTON */

function startCall(){

startCamera();

db.ref("call").set({
caller:userId
});

}

db.ref("call").on("value",function(snapshot){

let data=snapshot.val();

if(!data)return;

if(data.caller!==userId){

document.getElementById("incomingCall").style.display="block";

}

});

/* ACCEPT */

function acceptCall(){

document.getElementById("incomingCall").style.display="none";

startCamera();

}

/* REJECT */

function rejectCall(){

document.getElementById("incomingCall").style.display="none";

db.ref("call").remove();

}

/* END CALL */

function endCall(){

document.getElementById("videoPopup").style.display="none";

document.getElementById("remoteVideo").srcObject=null;

db.ref("call").remove();

}

</script>

</body>
</html>
