<!DOCTYPE html>
<html>
<head>
<title>🍭 LADUU PIYUU CHAT 💖</title>

<style>
body{
  display:none;
  font-family: Arial, sans-serif;
  height:100vh;
  display:flex;
  flex-direction:column;
  margin:0;
  padding:0;
  position:relative;
  /* GRADIENT + PHOTO EFFECT */
  background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fad0c4 100%);
  overflow:hidden;
}

/* FULL SCREEN FLOWER PHOTO AS BACKGROUND */
#flowerBg {
  position:fixed;
  top:-50%;
  left:-50%;
  width:200%;
  height:200%;
  opacity:0.3;
  z-index:-2;
  animation: floatFlowers 20s infinite linear;
}

@keyframes floatFlowers {
  0%, 100% { transform: translate(0, 0) rotate(0deg); }
  33% { transform: translate(30px, -30px) rotate(120deg); }
  66% { transform: translate(-20px, 20px) rotate(240deg); }
}

/* Header */
.header{
  background:rgba(255,77,109,0.95);
  color:white;
  padding:15px;
  font-size:20px;
  text-align:center;
  position:sticky;
  top:0;
  z-index:100;
  box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

/* Chat Area */
.chatbox{
  flex:1;
  overflow-y:auto;
  padding:15px;
  display:flex;
  flex-direction:column;
  scroll-behavior:smooth;
  gap:8px;
}

/* Messages */
.message{
  padding:15px 20px;
  margin:5px 0;
  border-radius:25px;
  max-width:85%;
  animation:pop 0.3s ease;
  word-wrap:break-word;
  font-size:16px;
  line-height:1.5;
  box-shadow:0 4px 15px rgba(0,0,0,0.1);
  position:relative;
}

.myMessage{
  background:linear-gradient(135deg, #ff6b9d, #ff8fab);
  color:white;
  margin-left:auto;
  text-align:right;
}

.otherMessage{
  background:white;
  border:2px solid #ffe4e6;
}

.time{
  font-size:12px;
  opacity:0.8;
  margin-top:5px;
}

/* Input Area - FILE BUTTON FIXED */
.inputArea{
  display:flex;
  padding:12px;
  background:rgba(255,255,255,0.95);
  gap:10px;
  position:sticky;
  bottom:0;
  z-index:100;
  align-items:center;
  box-shadow:0 -4px 20px rgba(0,0,0,0.1);
}

.inputArea input[type="text"]{
  flex:1;
  padding:15px 20px;
  border-radius:30px;
  border:2px solid #ffe4e6;
  font-size:16px;
  outline:none;
}

.inputArea input[type="file"]{
  padding:10px;
  border-radius:20px;
  background:#ffe4e6;
  color:#ff4d6d;
  font-size:14px;
}

.inputArea button{
  padding:15px 25px;
  border:none;
  background:linear-gradient(135deg, #ff4d6d, #ff6b9d);
  color:white;
  border-radius:30px;
  cursor:pointer;
  font-size:16px;
  font-weight:bold;
  transition:all 0.3s;
}

.inputArea button:hover{
  transform:scale(1.05);
  box-shadow:0 5px 20px rgba(255,77,109,0.4);
}

/* Emoji Picker */
#emojiPicker{
  display:none;
  position:absolute;
  bottom:80px;
  left:15px;
  right:15px;
  background:white;
  padding:15px;
  border-radius:25px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  z-index:200;
}

#emojiPicker span{
  font-size:28px;
  cursor:pointer;
  padding:10px;
  border-radius:15px;
  transition:all 0.3s;
}

#emojiPicker span:hover{
  background:#ffe4e6;
  transform:scale(1.3);
}

/* Animations */
@keyframes pop{
  from{transform:scale(0.8); opacity:0;}
  to{transform:scale(1); opacity:1;}
}

.heart{
  position:fixed;
  font-size:25px;
  animation:float 4s linear;
  pointer-events:none;
  z-index:1000;
}

@keyframes float{
  0%{transform:translateY(0);opacity:1;}
  100%{transform:translateY(-100vh);opacity:0;}
}

/* Mobile */
@media(max-width:500px){
  .message{max-width:95%;}
  .inputArea{padding:10px; gap:8px;}
  #emojiPicker{bottom:70px; left:10px; right:10px;}
}
</style>

</head>

<body>
<!-- YOUR FLOWER PHOTO -->
<img src="image.jpg" id="flowerBg" alt="Pink Flowers">

<div class="header">🌸 LADUU PIYUU CHAT 💖 🌸</div>

<div class="chatbox" id="chatbox"></div>

<div id="emojiPicker">
<span onclick="addEmoji('😍')">😍</span><span onclick="addEmoji('❤️')">❤️</span><span onclick="addEmoji('🌸')">🌸</span>
<span onclick="addEmoji('🥰')">🥰</span><span onclick="addEmoji('💕')">💕</span><span onclick="addEmoji('😘')">😘</span>
<span onclick="addEmoji('🔥')">🔥</span><span onclick="addEmoji('⭐')">⭐</span>
</div>

<div class="inputArea">
<button onclick="toggleEmoji()">😊</button>
<input id="message" type="text" placeholder="Type your sweet message 💕">
<input type="file" id="fileInput" accept="image/*,video/*">
<button onclick="sendMessage()">Send 💌</button>
</div>

<!-- CALL AREA SAME AS BEFORE -->
<div style="background:rgba(255,255,255,0.95);padding:15px;text-align:center;flex-shrink:0;border-top:2px solid #ffe4e6;">
<p>🌟 Your Call ID:</p>
<div id="myId" style="background:#ffe4e6;padding:10px;border-radius:20px;margin:10px;font-weight:bold;">Connecting...</div>
<input id="callId" placeholder="Enter partner ID" style="padding:10px;border-radius:20px;border:2px solid #ffe4e6;width:250px;">
<br><br>
<button onclick="audioCall()" style="background:#ff6b9d;margin:5px;">📞 Audio Call</button>
<button onclick="videoCall()" style="background:#ff4d6d;margin:5px;">🎥 Video Call</button>
</div>

<!-- ALL YOUR SCRIPTS SAME -->
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

<script>
// PASSWORD + ALL YOUR ORIGINAL JAVASCRIPT (unchanged)
let pass = prompt("Enter Password");
if(pass === "2020"){
  document.body.style.display = "flex";
} else {
  alert("❌ Wrong Password!");
  document.body.innerHTML = "<h1>❌ Access Denied</h1>";
}

// Firebase + ALL FUNCTIONS SAME AS BEFORE
const firebaseConfig={apiKey:"AIzaSyAKuUFmJshnvjHZ-bAhHN_bdlvwKkbyDbo",authDomain:"love--chat-872da.firebaseapp.com",databaseURL:"https://love--chat-872da-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"love--chat-872da"};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let userId=localStorage.getItem("chatUserId") || "user_"+Math.random().toString(36).substr(2,9);
localStorage.setItem("chatUserId",userId);

function toggleEmoji(){document.getElementById("emojiPicker").style.display=document.getElementById("emojiPicker").style.display==="none"?"flex":"none";}
function addEmoji(e){document.getElementById("message").value+=e; document.getElementById("message").focus();}

function sendMessage(){
  let msg=document.getElementById("message").value.trim();
  if(msg) db.ref("chat").push({text:msg,sender:userId,time:new Date().toLocaleTimeString()});
  document.getElementById("message").value="";
}

document.getElementById("fileInput").addEventListener("change",function(e){
  let file=e.target.files[0];
  if(!file) return;
  let reader=new FileReader();
  reader.onload=function(){db.ref("chat").push({file:reader.result,type:file.type,sender:userId,time:new Date().toLocaleTimeString()});}
  reader.readAsDataURL(file);
});

const chatbox=document.getElementById("chatbox");
db.ref("chat").on("child_added",function(snapshot){
  let data=snapshot.val();
  let div=document.createElement("div");
  div.className=data.sender===userId?"message myMessage":"message otherMessage";
  div.setAttribute("data-id",snapshot.key);
  let content=data.text || "";
  if(data.file){
    if(data.type?.startsWith("image/")) content=`<br><img src="${data.file}" style="max-width:250px;max-height:200px;border-radius:15px;">`;
    if(data.type?.startsWith("video/")) content=`<br><video src="${data.file}" controls style="max-width:250px;max-height:200px;border-radius:15px;"></video>`;
  }
  div.innerHTML=content+"<div class='time'>"+data.time+"</div>";
  if(data.sender===userId) div.innerHTML=`🗑️ <button onclick="deleteMsg('${snapshot.key}')" style="background:none;border:none;font-size:16px;float:right;cursor:pointer;">×</button>`+div.innerHTML;
  chatbox.appendChild(div);
  chatbox.scrollTop=chatbox.scrollHeight;
});

function deleteMsg(id){db.ref("chat/"+id).remove();}
db.ref("chat").on("child_removed",function(snapshot){let msg=document.querySelector(`[data-id="${snapshot.key}"]`);if(msg)msg.remove();});

// PEERJS CALLS SAME
let peer=new Peer();
peer.on("open",id=>document.getElementById("myId").innerText=id);
let localStream;
function audioCall(){let id=document.getElementById("callId").value;navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{localStream=stream;peer.call(id,stream);});}
function videoCall(){let id=document.getElementById("callId").value;navigator.mediaDevices.getUserMedia({video:true,audio:true}).then(stream=>{localStream=stream;document.getElementById("localVideo").srcObject=stream;peer.call(id,stream);});}
</script>

</body>
</html>
