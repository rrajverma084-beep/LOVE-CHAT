<!DOCTYPE html>
<html>
<head>
<title>🍭 LADUU PIYUU CHAT 💖</title>

<style>
body{
  display:none;
  font-family: Arial, sans-serif;
  height:100vh;
  flex-direction:column;
  background:linear-gradient(135deg,#ff9a9e,#fad0c4);
}

.header{
background:#ff4d6d;
color:white;
padding:12px;
font-size:18px;
text-align:center;
position:sticky;
top:0;
z-index:100;
}

.chatbox{
flex:1;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
}

.message{
padding:12px;
margin:6px;
border-radius:20px;
max-width:80%;
}

.myMessage{background:#ffccd5;margin-left:auto;}
.otherMessage{background:white;}

.inputArea{
display:flex;
padding:6px;
background:white;
gap:6px;
position:sticky;
bottom:0;
}

input[type="text"]{
flex:1;
padding:10px;
border-radius:20px;
border:1px solid #ccc;
}

button{
padding:8px;
border:none;
background:#ff4d6d;
color:white;
border-radius:50%;
cursor:pointer;
}

#emojiPicker{
display:none;
background:white;
padding:10px;
max-height:200px;
overflow-y:auto;
}

#emojiPicker span{
font-size:22px;
margin:5px;
cursor:pointer;
}
</style>

<script>
let pass = prompt("Enter Password");
if(pass==="2020"){
document.addEventListener("DOMContentLoaded",()=>document.body.style.display="flex");
}else{alert("Wrong");throw new Error();}
</script>

</head>

<body>

<div class="header">🍭 LADUU PIYUU CHAT 💖</div>

<div id="chatbox" class="chatbox"></div>

<div id="emojiPicker"></div>

<div class="inputArea">
<button onclick="toggleEmoji()">😊</button>
<input id="message">
<input type="file" id="fileInput">
<button onclick="sendMessage()">➤</button>
</div>

<div>
<p>Your ID: <span id="myId"></span></p>
<input id="callId">
<button onclick="audioCall()">📞</button>
<button onclick="videoCall()">🎥</button>
<video id="localVideo" autoplay muted></video>
<video id="remoteVideo" autoplay></video>
</div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

<script>
// ✅ EMOJI FIX
const emojiData={
"😃":["😀","😃","😄","😁","😂","🤣","😊","😍","😘","😎","🤗","🫂"],
"❤️":["❤️","💖","💕","💘","💝","💞"],
"👍":["👍","👎","👏","🙏","👌"],
"🐶":["🐶","🐱","🐭","🐰"],
"🍔":["🍔","🍕","🍟","🍩"],
"⚽":["⚽","🏀","🎮"],
"🚗":["🚗","✈️","🚀"]
};

let picker=document.getElementById("emojiPicker");
for(let cat in emojiData){
let d=document.createElement("div");
d.innerText=cat;
picker.appendChild(d);
emojiData[cat].forEach(e=>{
let s=document.createElement("span");
s.innerText=e;
s.onclick=()=>message.value+=e;
picker.appendChild(s);
});
}

function toggleEmoji(){
picker.style.display=picker.style.display==="none"?"block":"none";
}

// 🔥 FIREBASE
const firebaseConfig={
apiKey:"AIzaSyAKuUFmJshnvjHZ-bAhHN_bdlvwKkbyDbo",
databaseURL:"https://love--chat-872da-default-rtdb.asia-southeast1.firebasedatabase.app"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let userId=Math.random().toString(36);

function sendMessage(){
let msg=message.value.trim();
if(msg==="")return;
db.ref("chat").push({text:msg,sender:userId});
message.value="";
}

fileInput.onchange=function(){
let file=this.files[0];
let reader=new FileReader();
reader.onload=()=>{
db.ref("chat").push({file:reader.result,type:file.type,sender:userId});
};
reader.readAsDataURL(file);
};

db.ref("chat").on("child_added",snap=>{
let d=snap.val();
let div=document.createElement("div");
div.className=d.sender===userId?"myMessage message":"otherMessage message";

if(d.text) div.innerText=d.text;
if(d.file){
if(d.type.startsWith("image")) div.innerHTML="<img src='"+d.file+"'>";
if(d.type.startsWith("video")) div.innerHTML="<video src='"+d.file+"' controls></video>";
}

chatbox.appendChild(div);
});

// 🎥 CALL
let peer=new Peer();
peer.on("open",id=>myId.innerText=id);

function audioCall(){
navigator.mediaDevices.getUserMedia({audio:true}).then(s=>{
peer.call(callId.value,s).on("stream",r=>remoteVideo.srcObject=r);
});
}

function videoCall(){
navigator.mediaDevices.getUserMedia({video:true,audio:true}).then(s=>{
localVideo.srcObject=s;
peer.call(callId.value,s).on("stream",r=>remoteVideo.srcObject=r);
});
}

peer.on("call",call=>{
navigator.mediaDevices.getUserMedia({video:true,audio:true}).then(s=>{
localVideo.srcObject=s;
call.answer(s);
call.on("stream",r=>remoteVideo.srcObject=r);
});
});
</script>

</body>
</html>
