<!DOCTYPE html>
<html>
<head>
<title>🍭 LADUU PIYUU CHAT 💖</title>

<style>
body{
  display:none;
  font-family: Arial, sans-serif;
  height:100vh;
  flex-direction:column;
  background:linear-gradient(135deg,#ff9a9e,#fad0c4);
}

.header{
background:#ff4d6d;
color:white;
padding:12px;
text-align:center;
position:sticky;
top:0;
}

.chatbox{
flex:1;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
}

.message{padding:10px;margin:5px;border-radius:15px;max-width:80%;}
.myMessage{background:#ffccd5;margin-left:auto;}
.otherMessage{background:white;}

.inputArea{
display:flex;
padding:8px;
background:white;
gap:6px;
position:sticky;
bottom:0;
}

.inputArea input[type="text"]{
flex:1;
min-width:0;
padding:10px;
border-radius:20px;
border:1px solid #ccc;
}

.fileBtn{cursor:pointer;font-size:20px;}
</style>

<script>
let pass = prompt("Enter Password");
if(pass==="2020"){
document.addEventListener("DOMContentLoaded",()=>document.body.style.display="flex");
}else{alert("Wrong Password");throw new Error();}
</script>

</head>

<body>

<div class="header">🍭 LADUU PIYUU CHAT 💖</div>
<div class="chatbox" id="chatbox"></div>

<div class="inputArea">
<input id="message" type="text">
<label for="fileInput" class="fileBtn">📎</label>
<input type="file" id="fileInput" hidden>
<button onclick="sendMessage()">Send</button>
</div>

<div class="callArea">
<p>Your Call ID:</p>
<div id="myId">Connecting...</div>
<input id="callId" placeholder="Enter partner ID">
<button onclick="videoCall()">Call</button>
<video id="localVideo" autoplay muted></video>
<video id="remoteVideo" autoplay></video>
</div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

<script>
// FIREBASE (same)
const firebaseConfig={
apiKey:"AIzaSy...",
authDomain:"love--chat-872da.firebaseapp.com",
databaseURL:"https://love--chat-872da-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"love--chat-872da"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

// USER ID
let userId=localStorage.getItem("chatUserId")||("user_"+Math.random().toString(36).substr(2,9));
localStorage.setItem("chatUserId",userId);

// 🔥 SUPER FIXED PEER
let peer;

function startPeer(){
peer = new Peer({
  host:"0.peerjs.com",
  port:443,
  secure:true
});

peer.on("open",id=>{
  document.getElementById("myId").innerText=id;
  console.log("ID:",id);
});

peer.on("error",err=>{
  console.log("Error:",err);
  document.getElementById("myId").innerText="Retrying...";
  setTimeout(startPeer,2000); // auto retry 🔥
});

peer.on("disconnected",()=>{
  document.getElementById("myId").innerText="Reconnecting...";
  peer.reconnect();
});
}

startPeer();

// CHAT
function sendMessage(){
let msg=document.getElementById("message").value;
if(msg==="")return;
db.ref("chat").push({text:msg,sender:userId});
document.getElementById("message").value="";
}

db.ref("chat").on("child_added",snap=>{
let d=snap.val();
let div=document.createElement("div");
div.className=d.sender===userId?"message myMessage":"message otherMessage";
div.innerText=d.text;
chatbox.appendChild(div);
});

// CALL
function videoCall(){
let id=document.getElementById("callId").value;
navigator.mediaDevices.getUserMedia({video:true,audio:true}).then(stream=>{
document.getElementById("localVideo").srcObject=stream;
let call=peer.call(id,stream);
call.on("stream",r=>document.getElementById("remoteVideo").srcObject=r);
});
}

peer?.on("call",call=>{
navigator.mediaDevices.getUserMedia({video:true,audio:true}).then(stream=>{
document.getElementById("localVideo").srcObject=stream;
call.answer(stream);
call.on("stream",r=>document.getElementById("remoteVideo").srcObject=r);
});
});
</script>

</body>
</html>
