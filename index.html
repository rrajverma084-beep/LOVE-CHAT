<button onclick="startCall()">📞</button>

<div class="inputArea">
<input id="message" placeholder="Type message">
<button onclick="sendMessage()">Send</button>
</div>

<div class="callArea">

<p>Your Call ID:</p>
<div id="myId">Connecting...</div>

<input id="callId" placeholder="Enter partner ID">

<br><br>

<button onclick="startCamera()">Start Camera</button>

<video id="localVideo" autoplay muted></video>

</button>

<div id="incomingCall">
<h3>📞 Incoming Call</h3>
<button onclick="acceptCall()">Accept</button>
<button onclick="rejectCall()">Reject</button>
</div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

<script>

const firebaseConfig={
apiKey:"AIzaSyAKuUFmJshnvjHZ-bAhHN_bdlvwKkbyDbo",
authDomain:"love--chat-872da.firebaseapp.com",
databaseURL:"https://love--chat-872da-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"love--chat-872da"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();

let userId=localStorage.getItem("chatUserId");

if(!userId){
userId="user_"+Math.random().toString(36).substr(2,9);
localStorage.setItem("chatUserId",userId);
}

/* MESSAGE */

function sendMessage(){

let input=document.getElementById("message");
let msg=input.value.trim();

if(msg==="")return;

let time=new Date().toLocaleTimeString();

db.ref("chat").push({
text:msg,
time:time,
sender:userId
});

input.value="";
}

const chatbox=document.getElementById("chatbox");

db.ref("chat").on("child_added",function(snapshot){

let data=snapshot.val();

let div=document.createElement("div");

if(data.sender===userId){
div.className="message myMessage";
}else{
div.className="message otherMessage";
}

div.innerHTML=data.text+"<span class='time'>"+data.time+"</span>";

chatbox.appendChild(div);

chatbox.scrollTop=chatbox.scrollHeight;

});

/* VIDEO CALL */

let localStream;
let currentCall;

const peer=new Peer();

peer.on("open",function(id){
document.getElementById("myId").innerText=id;
});

async function startCamera(){

localStream=await navigator.mediaDevices.getUserMedia({
video:true,
audio:true
});

document.getElementById("localVideo").srcObject=localStream;

}

function callUser(){

let id=document.getElementById("callId").value;

currentCall=peer.call(id,localStream);

currentCall.on("stream",function(remoteStream){
document.getElementById("remoteVideo").srcObject=remoteStream;
});

}

peer.on("call",function(call){

call.answer(localStream);

call.on("stream",function(remoteStream){
document.getElementById("remoteVideo").srcObject=remoteStream;
});

});

/* CALL BUTTON */

function startCall(){

if(!localStream){
startCamera();
}

db.ref("call").set({
caller:userId
});

}

db.ref("call").on("value",function(snapshot){

let data=snapshot.val();

if(!data)return;

if(data.caller!==userId){

document.getElementById("incomingCall").style.display="block";

}

});

/* ACCEPT */

function acceptCall(){

document.getElementById("incomingCall").style.display="none";

callUser();

}

/* REJECT */

function rejectCall(){

document.getElementById("incomingCall").style.display="none";

db.ref("call").remove();

}

/* END CALL */

function endCall(){

if(currentCall){
currentCall.close();
}

document.getElementById("remoteVideo").srcObject=null;

db.ref("call").remove();

}

</script>

</body>
