<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍭 LADUU PIYUU CHAT 💖</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:sans-serif;
  height:100vh;
  display:flex;
  flex-direction:column;
  background:linear-gradient(135deg,#ff9a9e,#ff4d6d,#ff758c);
  overflow:hidden;
}

/* LOGIN */
#loginBox{
  position:fixed;
  inset:0;
  background:linear-gradient(135deg,#ff4d6d,#ff9a9e);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

/* EFFECTS */
.heart,.cloud,.bgText{
  position:absolute;
  pointer-events:none;
}

.heart{
  bottom:-50px;
  animation:up 8s linear infinite;
}

@keyframes up{
  0%{transform:translateY(0);}
  100%{transform:translateY(-110vh);}
}

.cloud{
  top:20px;
  animation:move 20s linear infinite;
}

@keyframes move{
  0%{left:-100px;}
  100%{left:110%;}
}

.bgText{
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:40px;
  opacity:0.15;
  color:white;
}

/* HEADER */
.header{
  background:#111b21;
  color:white;
  padding:10px;
  text-align:center;
}

/* CHAT */
.chatbox{
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
  position:relative;
}

.message{
  max-width:75%;
  padding:8px;
  margin:5px;
  border-radius:10px;
  color:white;
}

.my{background:#005c4b;margin-left:auto;}

/* INPUT */
.inputArea{
  display:flex;
  gap:5px;
  padding:6px;
  background:#111b21;
}

input{
  flex:1;
  padding:8px;
  border-radius:20px;
  border:none;
}

button{
  width:40px;
  border:none;
  border-radius:50%;
  background:#00a884;
  color:white;
}

/* EMOJI */
#emojiTabs{
  display:flex;
  overflow-x:auto;
  background:#202c33;
}

#emojiTabs button{
  margin:5px;
  padding:5px 10px;
  border:none;
  border-radius:10px;
  background:#111b21;
  color:white;
}

#emojiPicker{
  display:none;
  height:120px;
  overflow:auto;
  background:#202c33;
}

#emojiPicker span{
  font-size:22px;
  margin:5px;
  cursor:pointer;
}

/* CALL */
.callArea{
  background:#111b21;
  color:white;
  padding:10px;
  text-align:center;
}

video{
  width:48%;
  border-radius:10px;
  margin-top:5px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
<h2>🔐 Password</h2>
<input id="pass" type="password">
<button onclick="login()">GO</button>
</div>

<div id="app">

<div class="bgText">💖 LADUU PIYUU 💖</div>

<div class="heart" style="left:10%">❤️</div>
<div class="heart" style="left:50%">💖</div>
<div class="cloud">☁️</div>

<div class="header">💬 CHAT</div>

<div id="chatbox" class="chatbox"></div>

<div id="emojiTabs"></div>
<div id="emojiPicker"></div>

<div class="inputArea">
<button onclick="toggleEmoji()">😊</button>
<input id="msg">
<label>📎<input type="file" id="file" hidden></label>
<button onclick="send()">➤</button>
</div>

<!-- CALL -->
<div class="callArea">
<h3>📞 CALL</h3>
<input id="callId" placeholder="ID">
<button onclick="callUser()">📞</button>
<button onclick="endCall()">❌</button>

<br>
<video id="myVid" autoplay muted></video>
<video id="urVid" autoplay></video>
</div>

</div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<script>

/* LOGIN */
function login(){
if(document.getElementById("pass").value==="2020"){
document.getElementById("loginBox").style.display="none";
}
}

/* CHAT */
let chat=document.getElementById("chatbox");
let msg=document.getElementById("msg");
let file=document.getElementById("file");
let picker=document.getElementById("emojiPicker");

/* EMOJI */
const emojis={
"😀":["😀","😂","🤣","😊","😍","😎","😭","😡","🤗"],
"❤️":["❤️","💔","💕","💖","💗"],
"🔥":["🔥","⭐","✨","⚡","🌈"],
"👍":["👍","👏","🙏","💪"]
};

Object.keys(emojis).forEach(c=>{
let b=document.createElement("button");
b.innerText=c;
b.onclick=()=>{
picker.innerHTML="";
emojis[c].forEach(e=>{
let s=document.createElement("span");
s.innerText=e;
s.onclick=()=>msg.value+=e;
picker.appendChild(s);
});
};
document.getElementById("emojiTabs").appendChild(b);
});

function toggleEmoji(){
picker.style.display=picker.style.display==="block"?"none":"block";
}

function send(){
if(!msg.value)return;
chat.innerHTML+=`<div class="message my">${msg.value}</div>`;
msg.value="";
}

file.onchange=function(){
let r=new FileReader();
r.onload=()=>{
chat.innerHTML+=`<div class="message my"><img src="${r.result}" style="max-width:200px"></div>`;
};
r.readAsDataURL(file.files[0]);
};

/* CALL */
let peer=new Peer();
let myStream;
let call;

peer.on("call",c=>{
navigator.mediaDevices.getUserMedia({video:true,audio:true}).then(s=>{
myStream=s;
document.getElementById("myVid").srcObject=s;
c.answer(s);
c.on("stream",r=>{
document.getElementById("urVid").srcObject=r;
});
call=c;
});
});

function callUser(){
let id=document.getElementById("callId").value;

navigator.mediaDevices.getUserMedia({video:true,audio:true}).then(s=>{
myStream=s;
document.getElementById("myVid").srcObject=s;

let c=peer.call(id,s);
c.on("stream",r=>{
document.getElementById("urVid").srcObject=r;
});
call=c;
});
}

function endCall(){
if(call)call.close();
if(myStream)myStream.getTracks().forEach(t=>t.stop());
document.getElementById("urVid").srcObject=null;
document.getElementById("myVid").srcObject=null;
}

</script>

</body>
</html>
