<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍭 LADUU PIYUU CHAT 💖</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:sans-serif;
  height:100vh;
  display:none;
  flex-direction:column;
  overflow:auto;
  background:linear-gradient(135deg,#ff9a9e,#ff4d6d,#ff758c);  
}

/* 💖 EFFECTS */
.heart,.cloud,.glitter,.bgText{
  pointer-events:none;
  z-index:0;
  position:absolute;
}

.heart{
  bottom:-50px;
  font-size:20px;
  animation:floatUp 8s linear infinite;
  opacity:0.7;
}

@keyframes floatUp{0%{transform:translateY(0);}100%{transform:translateY(-110vh);}}

.cloud{
  top:10%;
  font-size:30px;
  animation:moveCloud 25s linear infinite;
  opacity:0.6;
}

@keyframes moveCloud{0%{left:-100px;}100%{left:110%;}}

.glitter{
  width:5px;height:5px;background:white;border-radius:50%;
  animation:glow 3s infinite;
}

@keyframes glow{0%{opacity:.3;}50%{opacity:1;}100%{opacity:.3;}}

.bgText{
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:40px;
  color:white;
  opacity:0.15;
}

/* UI */
.header,.chatbox,.inputArea,.callArea{position:relative;z-index:1;}

.header{background:#202c33;color:white;padding:12px;}

.chatbox{
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

.message{
  max-width:75%;
  padding:8px 12px;
  margin:4px 0;
  border-radius:8px;
  word-wrap:break-word;
}

.myMessage{background:#005c4b;color:white;margin-left:auto;}
.otherMessage{background:#202c33;color:white;}

.time{font-size:10px;opacity:.6;display:block;text-align:right;}

.inputArea{
  display:flex;
  gap:5px;
  padding:6px;
  background:#202c33;
}

input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
  background:#2a3942;
  color:white;
}

button{
  border:none;
  background:#00a884;
  color:white;
  border-radius:50%;
  width:38px;
  height:38px;
}

#emojiPicker{
  display:none;
  background:#202c33;
  padding:10px;
  max-height:120px;
  overflow:auto;
  position:relative;
  z-index:2;
}

#emojiPicker span{
  font-size:22px;
  margin:5px;
  cursor:pointer;
}

.callArea{
  display:none;
  background:#202c33;
  padding:10px;
  text-align:center;
}

video{
  width:48%;
  border-radius:8px;
  margin-top:5px;
}

.message img,.message video{
  max-width:200px;
  max-height:200px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="bgText">💖 LADUU PIYUU 💖</div>

<!-- 💖 EFFECTS -->
<div class="heart" style="left:10%">❤️</div>
<div class="heart" style="left:30%">💖</div>
<div class="heart" style="left:50%">💕</div>
<div class="heart" style="left:70%">💗</div>
<div class="heart" style="left:90%">💓</div>

<div class="cloud" style="top:10%">☁️</div>
<div class="cloud" style="top:20%">☁️</div>
<div class="cloud" style="top:30%">☁️</div>

<div id="chatbox" class="chatbox"></div>

<!-- 😊 EMOJI PICKER -->
<div id="emojiPicker"></div>

<div class="inputArea">
<button id="emojiBtn">😊</button>
<input id="message" placeholder="Message">
<label style="color:white;font-size:18px;cursor:pointer;">
📎
<input type="file" id="fileInput" hidden>
</label>
<button id="sendBtn">➤</button>
</div>

<button id="callToggle">📞 Call</button>

<!-- 📞 CALL AREA -->
<div id="callArea" class="callArea">
<p id="myId"></p>
<input id="callId" placeholder="Enter ID">
<br><br>

<button id="audioBtn">📞</button>
<button id="videoBtn">🎥</button>
<button id="endBtn">❌</button>

<br>
<video id="localVideo" autoplay muted></video>
<video id="remoteVideo" autoplay></video>
</div>

<audio id="sendSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>
<audio id="ringtone" src="https://www.soundjay.com/phone/sounds/telephone-ring-01a.mp3" loop></audio>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

<script>

/* 🔐 PASSWORD */
(function(){
const PASS="2020";

const box=document.createElement("div");
box.style.cssText=`
position:fixed;top:0;left:0;width:100%;height:100%;
background:black;display:flex;align-items:center;justify-content:center;
flex-direction:column;z-index:99999;color:white;
`;

const input=document.createElement("input");
input.type="password";
input.placeholder="Enter Password";
input.style.padding="10px";
input.style.borderRadius="10px";

const btn=document.createElement("button");
btn.innerText="Unlock";
btn.style.marginTop="10px";

box.appendChild(input);
box.appendChild(btn);
document.body.appendChild(box);

function unlock(){
if(input.value===PASS){
box.remove();
document.body.style.display="flex";
startApp();
}else{
box.innerHTML="<h2>❌ Wrong Password</h2>";
setTimeout(()=>location.reload(),1200);
}
}

btn.onclick=unlock;
input.onkeydown=(e)=>{if(e.key==="Enter")unlock();};

})();

/* 🚀 MAIN APP */
function startApp(){

/* glitter */
for(let i=0;i<25;i++){
let g=document.createElement("div");
g.className="glitter";
g.style.left=Math.random()*100+"%";
g.style.top=Math.random()*100+"%";
document.body.appendChild(g);
}

/* firebase */
firebase.initializeApp({
apiKey:"AIzaSyAKuUFmJshnvjHZ-bAhHN_bdlvwKkbyDbo",
authDomain:"love--chat-872da.firebaseapp.com",
databaseURL:"https://love--chat-872da-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"love--chat-872da"
});

const db=firebase.database();

const message=document.getElementById("message");
const chatbox=document.getElementById("chatbox");
const emojiPicker=document.getElementById("emojiPicker");

/* USER */
let userId=localStorage.getItem("chatUserId")||
("user_"+Math.random().toString(36).substr(2,9));
localStorage.setItem("chatUserId",userId);

/* 😊 EMOJIS */
const emojis=["😀","😂","😍","😘","😎","😭","👍","🔥","❤️"];
emojis.forEach(e=>{
let s=document.createElement("span");
s.innerText=e;
s.onclick=()=>message.value+=e;
emojiPicker.appendChild(s);
});

document.getElementById("emojiBtn").onclick=()=>{
emojiPicker.style.display=emojiPicker.style.display==="block"?"none":"block";
};

/* SEND */
document.getElementById("sendBtn").onclick=function(){
if(!message.value.trim())return;

db.ref("chat").push({
text:message.value,
sender:userId,
time:Date.now()
});

message.value="";
document.getElementById("sendSound").play().catch(()=>{});
};

/* FILE */
document.getElementById("fileInput").onchange=function(){
let file=this.files[0];
let reader=new FileReader();

reader.onload=()=>{
db.ref("chat").push({
file:reader.result,
type:file.type,
sender:userId,
time:Date.now()
});
};
reader.readAsDataURL(file);
};

/* CHAT LOAD */
db.ref("chat").on("child_added",snap=>{
let d=snap.val();
let div=document.createElement("div");
div.className=d.sender===userId?"message myMessage":"message otherMessage";

let content=d.text||"";
if(d.file){
if(d.type.startsWith("image")) content=`<img src="${d.file}">`;
if(d.type.startsWith("video")) content=`<video src="${d.file}" controls></video>`;
}

div.innerHTML=content+`<span class="time">${new Date(d.time).toLocaleTimeString()}</span>`;
chatbox.appendChild(div);
chatbox.scrollTop=chatbox.scrollHeight;
});

/* 📞 CALL SYSTEM */
let peer=new Peer();
let currentCall=null;

peer.on("open",id=>{
document.getElementById("myId").innerText=id;
});

document.getElementById("callToggle").onclick=()=>{
let c=document.getElementById("callArea");
c.style.display=c.style.display==="block"?"none":"block";
};

document.getElementById("audioBtn").onclick=()=>{
navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
currentCall=peer.call(document.getElementById("callId").value,stream);
currentCall.on("stream",r=>document.getElementById("remoteVideo").srcObject=r);
});
};

document.getElementById("videoBtn").onclick=()=>{
navigator.mediaDevices.getUserMedia({video:true,audio:true}).then(stream=>{
document.getElementById("localVideo").srcObject=stream;
currentCall=peer.call(document.getElementById("callId").value,stream);
currentCall.on("stream",r=>document.getElementById("remoteVideo").srcObject=r);
});
};

peer.on("call",call=>{
document.getElementById("ringtone").play();
if(!confirm("Incoming Call Accept?")){
call.close();
return;
}

navigator.mediaDevices.getUserMedia({video:true,audio:true}).then(stream=>{
document.getElementById("localVideo").srcObject=stream;
call.answer(stream);
call.on("stream",r=>document.getElementById("remoteVideo").srcObject=r);
currentCall=call;
document.getElementById("ringtone").pause();
});
});

document.getElementById("endBtn").onclick=()=>{
if(currentCall)currentCall.close();
document.getElementById("localVideo").srcObject=null;
document.getElementById("remoteVideo").srcObject=null;
};

}

</script>
</body>
</html>
