<!DOCTYPE html>
<html>
<head>
<title>🍭 LADUU PIYUU CHAT 💖</title>

<style>
body{
  display:none;
  font-family: Arial, sans-serif;
  height:100vh;
  flex-direction:column;
  background:linear-gradient(135deg,#ff9a9e,#fad0c4);
}

.header{
background:#ff4d6d;
color:white;
padding:12px;
font-size:18px;
text-align:center;
position:sticky;
top:0;
z-index:100;
}

.chatbox{
flex:1;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
scroll-behavior:smooth;
}

.message{
padding:12px 16px;
margin:6px;
border-radius:20px;
max-width:80%;
animation:pop .25s ease;
position:relative;
word-wrap:break-word;
font-size:16px;
line-height:1.4;
}

.myMessage{background:#ffccd5;margin-left:auto;}
.otherMessage{background:white;}

.time{
font-size:12px;
display:block;
margin-top:4px;
text-align:right;
opacity:.7;
}

.deleteBtn{
background:none;
border:none;
cursor:pointer;
font-size:14px;
float:right;
}

.inputArea{
display:flex;
padding:6px;
background:white;
gap:6px;
position:sticky;
bottom:0;
z-index:100;
align-items:center;
border-top:1px solid #ccc;
}

.inputArea input[type="text"]{
flex:1;
padding:10px 12px;
border-radius:20px;
border:1px solid #ccc;
font-size:14px;
outline:none;
}

.inputArea button{
padding:8px;
border:none;
background:#ff4d6d;
color:white;
border-radius:50%;
cursor:pointer;
width:38px;
height:38px;
display:flex;
align-items:center;
justify-content:center;
font-size:16px;
}

#fileInput{
width:90px;
font-size:12px;
}

/* Emoji Panel */
#emojiPicker{
display:none;
background:white;
padding:10px;
position:sticky;
bottom:60px;
z-index:90;
max-height:250px;
overflow-y:auto;
border-top:1px solid #ccc;
}

#emojiPicker span{
font-size:22px;
cursor:pointer;
margin:5px;
display:inline-block;
}

#emojiPicker span:hover{
background:#eee;
border-radius:6px;
}

.categoryTitle{
font-weight:bold;
margin:6px 0;
}
</style>

<script>
let pass = prompt("Enter Password");
if(pass === "2020"){
  document.addEventListener("DOMContentLoaded", function(){
    document.body.style.display = "flex";
  });
} else {
  alert("❌ Wrong Password!");
  throw new Error("Wrong Password");
}
</script>

</head>

<body>

<div class="header">🍭 LADUU PIYUU CHAT 💖</div>

<div class="chatbox" id="chatbox"></div>

<div id="emojiPicker"></div>

<div class="inputArea">
<button onclick="toggleEmoji()">😊</button>
<input id="message" type="text" placeholder="Type message...">
<button onclick="sendMessage()">➤</button>
</div>

<script>
// ✅ FIXED EMOJI DATA
const emojiData = {
"😃 Smileys":["😀","😃","😄","😁","😆","😅","😂","🤣","😊","😇","🙂","🙃","😉","😍","😘","😗","😙","😚","😋","😛","😜","🤪","🤓","😎","🥳"],
"❤️ Love & Hug":["❤️","💖","💕","💘","💝","💞","💓","💗","🤗","🫂","💋","🥰"],
"👍 Gestures":["👍","👎","👏","🙏","👌","✌️","🤝","🤘","👊","✊","🙌","🤞","👋"],
"😂 Funny":["😂","🤣","😜","😝","😛","🤪","🤡","💀","👻"],
"🐶 Animals":["🐶","🐱","🐭","🐰","🦊","🐻","🐼","🐯","🦁"],
"🍔 Food":["🍔","🍕","🍟","🍿","🍗","🍩","🎂","🍫","☕"],
"⚽ Activities":["⚽","🏀","🏏","🎮","🎯"],
"🚗 Travel":["🚗","🚕","✈️","🚀","🚂"],
"💡 Objects":["📱","💻","📷","💡","💰"],
"🔥 Symbols":["🔥","⭐","✨","💯","✔️","❌"],
"🌍 Flags":["🇮🇳","🇺🇸","🇬🇧"]
};

// render emoji
const picker=document.getElementById("emojiPicker");

for(let cat in emojiData){
let title=document.createElement("div");
title.className="categoryTitle";
title.innerText=cat;
picker.appendChild(title);

emojiData[cat].forEach(e=>{
let span=document.createElement("span");
span.innerText=e;
span.onclick=()=>{document.getElementById("message").value+=e;}
picker.appendChild(span);
});
}

// toggle
function toggleEmoji(){
let box=document.getElementById("emojiPicker");
box.style.display=box.style.display==="none"?"block":"none";
}

// dummy send (safe)
function sendMessage(){
let msg=document.getElementById("message").value;
if(msg.trim()!==""){
alert("Message: "+msg);
document.getElementById("message").value="";
}
}
</script>

</body>
</html>
