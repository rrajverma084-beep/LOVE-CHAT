<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍭 LADUU PIYUU CHAT 💖</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:sans-serif;
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:auto;
  background:linear-gradient(135deg,#ff9a9e,#ff4d6d,#ff758c);
}

/* 🔐 LOGIN */
#loginBox{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:linear-gradient(135deg,#ff4d6d,#ff9a9e);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:99999;
}

/* 💖 EFFECTS BACK */
.heart,.cloud,.bgText{
  position:absolute;
  pointer-events:none;
  z-index:0;
}

.heart{
  bottom:-50px;
  font-size:20px;
  animation:floatUp 8s linear infinite;
  opacity:0.7;
}

@keyframes floatUp{
  0%{transform:translateY(0);}
  100%{transform:translateY(-110vh);}
}

.cloud{
  top:10%;
  font-size:30px;
  animation:moveCloud 25s linear infinite;
  opacity:0.6;
}

@keyframes moveCloud{
  0%{left:-100px;}
  100%{left:110%;}
}

.bgText{
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:40px;
  color:white;
  opacity:0.15;
}

/* UI */
.header,.chatbox,.inputArea,.callArea{position:relative;z-index:1;}

.chatbox{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;}

.message{max-width:75%;padding:8px 12px;margin:4px 0;border-radius:8px;}
.myMessage{background:#005c4b;color:white;margin-left:auto;}
.otherMessage{background:#202c33;color:white;}

.time{font-size:10px;opacity:.6;display:block;text-align:right;}

.inputArea{display:flex;gap:5px;padding:6px;background:#202c33;}
input{flex:1;padding:10px;border-radius:20px;border:none;background:#2a3942;color:white;}

button{border:none;background:#00a884;color:white;border-radius:50%;width:38px;height:38px;cursor:pointer;}

/* EMOJI */
#emojiTabs{
  display:flex;
  gap:5px;
  overflow-x:auto;
  background:#111b21;
  padding:5px;
}

#emojiTabs button{
  background:#202c33;
  color:white;
  border:none;
  font-size:12px;
  padding:5px 10px;
  border-radius:10px;
}

#emojiPicker{
  display:none;
  background:#202c33;
  padding:10px;
  max-height:150px;
  overflow:auto;
}

#emojiPicker span{
  font-size:20px;
  margin:5px;
  cursor:pointer;
}

.callArea{display:none;background:#202c33;padding:10px;text-align:center;margin-top:25px;}

video{width:48%;border-radius:8px;margin-top:5px;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
<h2 style="color:white;">🔐 ENTER PASSWORD</h2>
<input id="passInput" type="password">
<button onclick="checkPassword()">GO</button>
<p id="error" style="color:white;margin-top:10px;"></p>
</div>

<div id="app">

<!-- 💖 BACKGROUND EFFECTS RESTORED -->
<div class="bgText">💖 LADUU PIYUU 💖</div>

<div class="heart" style="left:10%">❤️</div>
<div class="heart" style="left:30%">💖</div>
<div class="heart" style="left:50%">💕</div>
<div class="heart" style="left:70%">💗</div>
<div class="heart" style="left:90%">💓</div>

<div class="cloud" style="top:10%">☁️</div>
<div class="cloud" style="top:20%">☁️</div>
<div class="cloud" style="top:30%">☁️</div>

<div class="header">💬 LADUU PIYUU CHAT</div>
<div id="chatbox" class="chatbox"></div>

<div id="emojiTabs"></div>
<div id="emojiPicker"></div>

<div class="inputArea">
<button onclick="toggleEmoji()">😊</button>
<input id="message">
<label style="color:white;">📎<input type="file" id="fileInput" hidden></label>
<button onclick="sendMessage()">➤</button>
</div>

</div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

<script>

/* PASSWORD */
function checkPassword(){
let pass=document.getElementById("passInput").value;
if(pass==="2020"){
document.getElementById("loginBox").style.display="none";
}else{
document.getElementById("error").innerText="❌ Wrong Password!";
}
}

const message=document.getElementById("message");
const chatbox=document.getElementById("chatbox");
const emojiPicker=document.getElementById("emojiPicker");
const emojiTabs=document.getElementById("emojiTabs");
const fileInput=document.getElementById("fileInput");

/* EMOJI SYSTEM (same full pack) */
const emojiGroups={
"😀":["😀","😁","😂","🤣","😊","😍","🥰","😘","😎","😭","😡","🤗","🤩"],
"❤️":["❤️","💔","💕","💖","💗","💓","💞","💘"],
"👍":["👍","👎","👏","🙌","🤝","🙏","💪"],
"🔥":["🔥","💯","⭐","✨","⚡","🌈","🌙","☀️"],
"🎉":["🎉","🎊","🎁","🏆","🎮","⚽","🏀"],
"🐻":["🐶","🐱","🐻","🐼","🦄"]
};

function loadEmojis(cat){
emojiPicker.innerHTML="";
emojiGroups[cat].forEach(e=>{
let s=document.createElement("span");
s.innerText=e;
s.onclick=()=>message.value+=e;
emojiPicker.appendChild(s);
});
}

Object.keys(emojiGroups).forEach(cat=>{
let btn=document.createElement("button");
btn.innerText=cat;
btn.onclick=()=>loadEmojis(cat);
emojiTabs.appendChild(btn);
});

loadEmojis("😀");

function toggleEmoji(){
emojiPicker.style.display=emojiPicker.style.display==="block"?"none":"block";
}

/* CHAT */
function sendMessage(){
let msg=message.value.trim();
if(!msg)return;
chatbox.innerHTML+=`<div class="message myMessage">${msg}</div>`;
message.value="";
}

/* FILE */
fileInput.onchange=function(){
let file=this.files[0];
let reader=new FileReader();
reader.onload=()=>{
chatbox.innerHTML+=`<div class="message myMessage"><img src="${reader.result}" style="max-width:200px;"></div>`;
};
reader.readAsDataURL(file);
};

</script>

</body>
</html>
