<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍭 LADUU PIYUU CHAT 💖</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:sans-serif;}
#loginPage{height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#ff758c,#ff7eb3);}
.loginBox{background:rgba(255,255,255,0.1);padding:30px;border-radius:20px;text-align:center;color:white;}
.loginBox input{padding:10px;border-radius:20px;margin-top:10px;border:none;}
.loginBox button{margin-top:10px;padding:10px 20px;border:none;border-radius:20px;background:#00a884;color:white;}

#mainApp{display:none;height:100vh;flex-direction:column;background:linear-gradient(135deg,#ff9a9e,#ff4d6d);}
.chatbox{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;}
.message{max-width:75%;padding:8px;margin:4px;border-radius:8px;}
.myMessage{background:#005c4b;color:white;margin-left:auto;}
.otherMessage{background:#202c33;color:white;}

.inputArea{display:flex;gap:5px;padding:6px;background:#202c33;}
input{flex:1;padding:10px;border-radius:20px;border:none;background:#2a3942;color:white;}
button{border:none;background:#00a884;color:white;border-radius:50%;width:38px;height:38px;}

#emojiPicker{display:none;background:#202c33;padding:10px;max-height:120px;overflow:auto;}
#emojiPicker span{cursor:pointer;}

video{width:45%;margin-top:5px;}
</style>
</head>

<body>

<div id="loginPage">
<div class="loginBox">
<h2>🔐 Login</h2>
<input id="passInput" type="password" placeholder="Password">
<br><button onclick="checkPass()">Login</button>
<p id="errorText"></p>
</div>
</div>

<div id="mainApp">

<div id="chatbox" class="chatbox"></div>
<div id="emojiPicker"></div>

<div class="inputArea">
<button id="emojiBtn">😊</button>
<input id="message">
<input type="file" id="fileInput">
<button id="sendBtn">➤</button>
</div>

<button id="callToggle">📞 Call</button>

<div id="callArea" style="display:none;">
<p id="myId"></p>
<input id="callId" placeholder="Enter ID">
<button id="audioBtn">📞</button>
<button id="videoBtn">🎥</button>
<button id="endBtn">❌</button><br>
<video id="localVideo" autoplay muted></video>
<video id="remoteVideo" autoplay></video>
</div>

</div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

<script>
const PASS="2020";

function checkPass(){
if(passInput.value===PASS){
loginPage.style.display="none";
mainApp.style.display="flex";
startApp();
}else{
errorText.innerText="Wrong Password!";
}
}

let started=false;

function startApp(){

if(!firebase.apps.length){
firebase.initializeApp({
apiKey:"AIzaSyAKuUFmJshnvjHZ-bAhHN_bdlvwKkbyDbo",
authDomain:"love--chat-872da.firebaseapp.com",
databaseURL:"https://love--chat-872da-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"love--chat-872da"
});
}

firebase.auth().onAuthStateChanged(user=>{
if(user && !started){
started=true;
initChat(user.uid);
}
});

if(!firebase.auth().currentUser){
firebase.auth().signInAnonymously();
}
}

function initChat(userId){

const db=firebase.database();
const chatbox=document.getElementById("chatbox");

/* EMOJI */
const emojiPicker=document.getElementById("emojiPicker");
const message=document.getElementById("message");

["😀","😂","😍","❤️","👍"].forEach(e=>{
let span=document.createElement("span");
span.innerText=e;
span.onclick=()=>message.value+=e;
emojiPicker.appendChild(span);
});

emojiBtn.onclick=()=>emojiPicker.style.display=
emojiPicker.style.display==="block"?"none":"block";

/* SEND */
sendBtn.onclick=()=>{
if(!message.value.trim())return;

db.ref("chat").push({
text:message.value,
sender:userId
});
message.value="";
};

/* FILE */
fileInput.onchange=function(){
let file=this.files[0];
let reader=new FileReader();
reader.onload=()=>{
db.ref("chat").push({
file:reader.result,
type:file.type,
sender:userId
});
};
reader.readAsDataURL(file);
};

/* LOAD */
db.ref("chat").on("child_added",snap=>{
let d=snap.val();
let key=snap.key;

let div=document.createElement("div");
div.className=d.sender===userId?"message myMessage":"message otherMessage";

if(d.text) div.innerText=d.text;

if(d.file){
if(d.type.startsWith("image")){
let img=document.createElement("img");
img.src=d.file;
img.style.maxWidth="150px";
div.appendChild(img);
}
}

chatbox.appendChild(div);
chatbox.scrollTop=chatbox.scrollHeight;
});

/* CALL */
let peer=new Peer();
let currentCall;

peer.on("open",id=>myId.innerText=id);

callToggle.onclick=()=>callArea.style.display=
callArea.style.display==="block"?"none":"block";

audioBtn.onclick=()=>{
navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
currentCall=peer.call(callId.value,stream);
currentCall.on("stream",r=>remoteVideo.srcObject=r);
});
};

videoBtn.onclick=()=>{
navigator.mediaDevices.getUserMedia({video:true,audio:true}).then(stream=>{
localVideo.srcObject=stream;
currentCall=peer.call(callId.value,stream);
currentCall.on("stream",r=>remoteVideo.srcObject=r);
});
};

peer.on("call",call=>{
navigator.mediaDevices.getUserMedia({video:true,audio:true}).then(stream=>{
localVideo.srcObject=stream;
call.answer(stream);
call.on("stream",r=>remoteVideo.srcObject=r);
});
});

endBtn.onclick=()=>{
if(currentCall)currentCall.close();
localVideo.srcObject=null;
remoteVideo.srcObject=null;
};

}
</script>

</body>
</html>
