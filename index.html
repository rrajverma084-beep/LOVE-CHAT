<!DOCTYPE html>
<html>
<head>
<title>Private Chat</title>

<style>

body{
font-family: Arial;

/* LOVE BACKGROUND */
background: linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4,#ffdde1);

display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
position:relative;
overflow:hidden;
}

/* LADDUU NAME BACKGROUND */
body::before{
content:"LADDUU";
position:absolute;
font-size:150px;
color:rgba(255,255,255,0.25);
top:50%;
left:50%;
transform:translate(-50%,-50%) rotate(-20deg);
font-weight:bold;
letter-spacing:20px;
pointer-events:none;
}

.container{
width:350px;
background:white;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,0.3);
overflow:hidden;
z-index:1;
}

.header{
background:#ff4d6d;
color:white;
padding:10px;
text-align:center;
font-size:18px;
font-weight:bold;
}

.chatbox{
height:320px;
padding:10px;
overflow-y:auto;
background:#fff0f3;
display:flex;
flex-direction:column;
}

.message{
background:#dcf8c6;
padding:8px;
margin:5px;
border-radius:6px;
width:fit-content;
max-width:75%;
}

.time{
font-size:10px;
color:gray;
margin-top:3px;
}

.inputArea{
display:flex;
border-top:1px solid #ccc;
}

.inputArea input{
flex:1;
padding:10px;
border:none;
outline:none;
}

.inputArea button{
background:#ff4d6d;
border:none;
padding:10px;
color:white;
cursor:pointer;
}

.login{
text-align:center;
padding:20px;
}

.login input{
padding:8px;
}

.login button{
padding:8px 12px;
background:#ff4d6d;
border:none;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<div class="header">❤️ Private Love Chat ❤️</div>

<div class="login" id="login">
<input type="password" id="password" placeholder="Enter Password">
<button onclick="login()">Enter</button>
</div>

<div id="chat" style="display:none;">

<div class="chatbox" id="chatbox"></div>

<div class="inputArea">
<input type="text" id="message" placeholder="Type message">
<button onclick="sendMessage()">Send</button>
</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

const firebaseConfig = {

apiKey: "AIzaSyAKuUFmJshnvjHZ-bAhHN_bdlvwKkbyDbo",
authDomain: "love--chat-872da.firebaseapp.com",
databaseURL: "https://love--chat-872da-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "love--chat-872da",
storageBucket: "love--chat-872da.appspot.com",
messagingSenderId: "669278823844",
appId: "1:669278823844:web:b165f5000a3e82164c0d31"

};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.login = function(){

let pass = document.getElementById("password").value;

if(pass === "1234"){

document.getElementById("login").style.display="none";
document.getElementById("chat").style.display="block";

}else{

alert("Wrong Password");

}

}

window.sendMessage = function(){

let input = document.getElementById("message");
let msg = input.value.trim();

if(msg === "") return;

push(ref(db,"chat"),{

text: msg,
time: new Date().toLocaleTimeString()

});

input.value="";

}

document.getElementById("message").addEventListener("keypress",function(e){

if(e.key === "Enter"){

sendMessage();

}

});

const chatbox = document.getElementById("chatbox");

onChildAdded(ref(db,"chat"), function(snapshot){

const data = snapshot.val();

let msgDiv = document.createElement("div");
msgDiv.className="message";

msgDiv.innerHTML = `
<div>${data.text}</div>
<div class="time">${data.time}</div>
`;

chatbox.appendChild(msgDiv);

chatbox.scrollTop = chatbox.scrollHeight;

});

</script>

</body>
</html>
