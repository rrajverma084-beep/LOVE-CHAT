<!DOCTYPE html>
<html>
<head>
<title>Private Chat</title>

<style>

body{
font-family: Arial;
background:#0b141a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
width:380px;
height:540px;
background:#efeae2;
border-radius:10px;
overflow:hidden;
display:flex;
flex-direction:column;
}

.header{
background:#075E54;
color:white;
padding:12px;
text-align:center;
font-size:18px;
}

.chatbox{
flex:1;
padding:10px;
overflow-y:auto;
display:flex;
flex-direction:column;
}

.msg{
max-width:70%;
padding:8px;
margin:4px;
border-radius:8px;
font-size:14px;
position:relative;
}

.me{
background:#dcf8c6;

}

.other{
background:white;
align-self:flex-start;
}

.time{
font-size:10px;
color:gray;
margin-top:3px;
text-align:right;
}

.delete{
font-size:10px;
color:red;
cursor:pointer;
position:absolute;
top:2px;

}

.inputArea{
display:flex;
background:#f0f0f0;

}

.inputArea input{
flex:1;
padding:10px;
border:none;
border-radius:20px;
outline:none;
}

.inputArea button{
background:#25D366;
border:none;
margin-left:5px;
padding:10px 15px;
border-radius:50%;
cursor:pointer;
color:white;
font-weight:bold;
}

.login{
padding:20px;
text-align:center;
}

.login input{
padding:8px;
margin:5px;
}

</style>

</head>

<body>

<div class="container">

<div class="header">Private Chat</div>

<div class="login" id="login">

<input id="name" placeholder="Your Name"><br>

<input type="password" id="password" placeholder="Password"><br>

<button onclick="login()">Enter Chat</button>

</div>

<div id="chat" style="display:none;flex:1;flex-direction:column;">

<div class="chatbox" id="chatbox"></div>

<div class="inputArea">
<input type="text" id="message" placeholder="Type message">
<button onclick="sendMessage()">➤</button>
</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

const firebaseConfig = {

apiKey: "AIzaSyAKuUFmJshnvjHZ-bAhHN_bdlvwKkbyDbo",
authDomain: "love--chat-872da.firebaseapp.com",
databaseURL: "https://love--chat-872da-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "love--chat-872da",
storageBucket: "love--chat-872da.appspot.com",
messagingSenderId: "669278823844",
appId: "1:669278823844:web:b165f5000a3e82164c0d31"

};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let myName="";

window.login=function(){

let pass=document.getElementById("password").value;

if(pass==="1234"){

myName=document.getElementById("name").value || "User";

document.getElementById("login").style.display="none";
document.getElementById("chat").style.display="flex";

}else{

alert("Wrong Password");

}

}

window.sendMessage=function(){

let input=document.getElementById("message");
let text=input.value.trim();

if(text==="") return;

push(ref(db,"chat"),{

name:myName,
text:text,
time:new Date().toLocaleTimeString()

});

input.value="";

}

document.getElementById("message").addEventListener("keypress",function(e){

if(e.key==="Enter") sendMessage();

});

const chatbox=document.getElementById("chatbox");

onChildAdded(ref(db,"chat"),function(snapshot){

const data=snapshot.val();
const key=snapshot.key;

let msg=document.createElement("div");

msg.className="msg "+(data.name===myName?"me":"other");

msg.innerHTML=`

<div class="delete" onclick="deleteMsg('${key}')">✖</div>

<b>${data.name}</b><br>

${data.text}

<div class="time">${data.time}</div>

`;

chatbox.appendChild(msg);

chatbox.scrollTop=chatbox.scrollHeight;

});

window.deleteMsg=function(id){

remove(ref(db,"chat/"+id));

}

</script>

</body>
</html>
