<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LADUU🤗🤗🤗🤗 PIYUU CHAT/title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  display:none;
  font-family:sans-serif;
  height:100vh;
  display:flex;
  flex-direction:column;
  background:#111b21;
}

.header{
  background:#202c33;
  color:white;
  padding:12px;
  font-size:18px;
  display:flex;
  align-items:center;
  gap:10px;
}

.chatbox{
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
  background:#0b141a;
}

.message{
  max-width:75%;
  padding:8px 12px;
  margin:4px 0;
  border-radius:8px;
  font-size:14px;
  position:relative;
}

.myMessage{
  background:#005c4b;
  color:white;
  margin-left:auto;
}

.otherMessage{
  background:#202c33;
  color:white;
}

.time{
  font-size:10px;
  opacity:.6;
  display:block;
  text-align:right;
  margin-top:3px;
}

.inputArea{
  display:flex;
  padding:8px;
  background:#202c33;
  align-items:center;
  gap:6px;
}

.inputArea input[type="text"]{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
  outline:none;
  background:#2a3942;
  color:white;
}

button{
  border:none;
  background:#00a884;
  color:white;
  border-radius:50%;
  width:40px;
  height:40px;
  font-size:16px;
}

#emojiPicker{
  display:none;
  background:#202c33;
  padding:10px;
  max-height:200px;
  overflow:auto;
}

#emojiPicker span{
  font-size:20px;
  margin:5px;
  cursor:pointer;
}

.callArea{
  background:#202c33;
  padding:10px;
  text-align:center;
}

video{
  width:48%;
  border-radius:8px;
  margin:2px;
}

img{
  max-width:100%;
  border-radius:8px;
}

</style>

<script>
let pass = prompt("Enter Password");
if(pass === "2020"){
  document.addEventListener("DOMContentLoaded", ()=>{
    document.body.style.display="flex";
  });
}else{
  alert("Wrong Password");
  throw new Error("Wrong Password");
}
</script>

</head>
<body>

<div class="header">💬 WhatsApp Style Chat</div>
<div class="chatbox" id="chatbox"></div>
<div id="emojiPicker"></div>

<div class="inputArea">
<button onclick="toggleEmoji()">😊</button>
<input id="message" placeholder="Message">
<input type="file" id="fileInput" accept="image/*,video/*">
<button onclick="sendMessage()">➤</button>
</div>

<div class="callArea">
<p>ID:</p>
<div id="myId"></div>
<input id="callId" placeholder="Enter ID">
<br><br>
<button onclick="audioCall()">📞</button>
<button onclick="videoCall()">🎥</button>
<button onclick="endCall()">❌</button>
<br>
<video id="localVideo" autoplay muted></video>
<video id="remoteVideo" autoplay></video>
</div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

<script>
const emojis=["😀","😂","😍","😘","😎","😭","👍","🔥","❤️"];
const picker=document.getElementById("emojiPicker");
emojis.forEach(e=>{
  let s=document.createElement("span");
  s.innerText=e;
  s.onclick=()=>message.value+=e;
  picker.appendChild(s);
});
function toggleEmoji(){
  picker.style.display=picker.style.display==='block'?'none':'block';
}

const firebaseConfig={
apiKey:"AIzaSyAKuUFmJshnvjHZ-bAhHN_bdlvwKkbyDbo",
authDomain:"love--chat-872da.firebaseapp.com",
databaseURL:"https://love--chat-872da-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"love--chat-872da"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let userId=localStorage.getItem("chatUserId");
if(!userId){
  userId="user_"+Math.random().toString(36).substr(2,9);
  localStorage.setItem("chatUserId",userId);
}

function sendMessage(){
  let msg=message.value.trim();
  if(!msg) return;
  db.ref("chat").push({text:msg,sender:userId,time:Date.now()});
  message.value="";
}

fileInput.onchange=function(){
  let file=this.files[0];
  let reader=new FileReader();
  reader.onload=()=>{
    db.ref("chat").push({file:reader.result,type:file.type,sender:userId,time:Date.now()});
  };
  reader.readAsDataURL(file);
};

db.ref("chat").on("child_added",snap=>{
  let d=snap.val();
  let div=document.createElement("div");
  div.className=d.sender===userId?"message myMessage":"message otherMessage";

  let content="";
  if(d.text) content=d.text;
  if(d.file){
    if(d.type.startsWith("image")) content="<img src='"+d.file+"'>";
    if(d.type.startsWith("video")) content="<video src='"+d.file+"' controls></video>";
  }

  let time=new Date(d.time).toLocaleTimeString();
  div.innerHTML=content+"<span class='time'>"+time+"</span>";

  chatbox.appendChild(div);
  chatbox.scrollTop=chatbox.scrollHeight;
});

let peer=new Peer();
let currentCall=null;
peer.on("open",id=>myId.innerText=id);

function audioCall(){
  navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
    currentCall=peer.call(callId.value,stream);
    currentCall.on("stream",r=>remoteVideo.srcObject=r);
  });
}

function videoCall(){
  navigator.mediaDevices.getUserMedia({video:true,audio:true}).then(stream=>{
    localVideo.srcObject=stream;
    currentCall=peer.call(callId.value,stream);
    currentCall.on("stream",r=>remoteVideo.srcObject=r);
  });
}

peer.on("call",call=>{
  navigator.mediaDevices.getUserMedia({video:true,audio:true}).then(stream=>{
    localVideo.srcObject=stream;
    call.answer(stream);
    call.on("stream",r=>remoteVideo.srcObject=r);
    currentCall=call;
  });
});

function endCall(){
  if(currentCall) currentCall.close();
  remoteVideo.srcObject=null;
  localVideo.srcObject=null;
}
</script>

</body>
</html>
